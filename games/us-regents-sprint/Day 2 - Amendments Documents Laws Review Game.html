<style>
:root {
  --bg0: #080a13;
  --bg1: #111827;
  --panel: rgba(12, 18, 33, .82);
  --line: rgba(255,255,255,.16);
  --text: #f8fbff;
  --muted: #aebad1;
  --accent: #f6c85f;
  --accent2: #2ec4b6;
  --accent3: #ff4f79;
  --glow: rgba(46, 196, 182, .42);
  --tile: #214f8f;
  --tile2: #8f2d56;
  --danger: #ff5f65;
  --ok: #36e6a4;
  --arena: url("../../assets/jeopardy/arena.jpg");
  --tile-art: url("../../assets/jeopardy/tile-art.jpg");
  --panel-art: url("../../assets/jeopardy/panel-art.jpg");
  --board-frame: url("../../assets/jeopardy/board-frame.jpg");
  --daily-art: url("../../assets/jeopardy/daily-art.jpg");
  --final-art: url("../../assets/jeopardy/final-art.jpg");
  --clue-art: url("../../assets/jeopardy/clue-art.jpg");
  --tilt-x: 0deg;
  --tilt-y: 0deg;
  --spot-x: 50%;
  --spot-y: 42%;
  --scene-x: 0px;
  --scene-y: 0px;
}
* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  color: var(--text);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #050812;
  overflow-x: hidden;
  position: relative;
  isolation: isolate;
}
button, input, textarea { font: inherit; }
button {
  border: 0;
  color: var(--text);
  cursor: pointer;
  position: relative;
  z-index: 2;
  touch-action: manipulation;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
button:disabled {
  cursor: not-allowed;
  opacity: .62;
}
#arenaBg {
  position: fixed;
  inset: 0;
  z-index: -5;
  background:
    linear-gradient(180deg, rgba(4,8,18,.22), rgba(4,8,18,.58) 44%, rgba(4,8,18,.88)),
    radial-gradient(circle at 50% 18%, rgba(255,209,102,.16), transparent 24%),
    var(--arena) center / cover no-repeat;
  filter: saturate(1.16) contrast(1.08);
  transform: translate3d(var(--scene-x), var(--scene-y), 0) scale(1.032);
  transition: transform 90ms linear;
}
#arenaBg::before,
#arenaBg::after {
  content: "";
  position: absolute;
  inset: -18%;
  pointer-events: none;
}
#arenaBg::before {
  background:
    conic-gradient(from 120deg at 50% 30%, transparent 0deg, rgba(255,209,102,.16) 18deg, transparent 42deg, transparent 112deg, rgba(0,212,255,.13) 135deg, transparent 164deg, transparent 360deg);
  mix-blend-mode: screen;
  animation: lightSweep 16s linear infinite;
}
#arenaBg::after {
  background:
    radial-gradient(circle at 50% 55%, transparent 0 20%, rgba(0,0,0,.26) 52%, rgba(0,0,0,.72) 100%),
    linear-gradient(90deg, rgba(0,0,0,.6), transparent 22%, transparent 78%, rgba(0,0,0,.6));
}
@keyframes lightSweep {
  from { transform: rotate(0deg) scale(1.1); }
  to { transform: rotate(360deg) scale(1.1); }
}
#space {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: -3;
}
.scanlines {
  pointer-events: none;
  position: fixed;
  inset: 0;
  z-index: -1;
  background: repeating-linear-gradient(0deg, rgba(255,255,255,.035), rgba(255,255,255,.035) 1px, transparent 1px, transparent 6px);
  mix-blend-mode: overlay;
  opacity: .4;
}
.app {
  position: relative;
  z-index: 1;
  min-height: 100%;
  padding: 20px clamp(12px, 2.5vw, 34px) 38px;
  animation: appBoot .78s cubic-bezier(.16, 1, .3, 1) both;
}
@keyframes appBoot {
  from { opacity: 0; transform: translateY(18px) scale(.985); filter: blur(8px); }
  to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}
.stage-wipe {
  position: fixed;
  inset: 0;
  z-index: 60;
  pointer-events: none;
  background:
    linear-gradient(90deg, transparent 0 34%, rgba(255,255,255,.32) 46%, rgba(255,209,102,.36) 50%, rgba(0,212,255,.22) 55%, transparent 70%),
    radial-gradient(circle at 50% 52%, rgba(255,255,255,.18), transparent 28%);
  mix-blend-mode: screen;
  animation: stageWipe 1.35s cubic-bezier(.16, 1, .3, 1) both;
}
@keyframes stageWipe {
  0% { opacity: 0; transform: translateX(-60%) skewX(-10deg); }
  18% { opacity: .85; }
  100% { opacity: 0; transform: translateX(60%) skewX(-10deg); }
}
.topbar {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 18px;
  align-items: start;
  margin: 0 auto 16px;
  max-width: 1480px;
  animation: hudDrop .75s cubic-bezier(.16, 1, .3, 1) both;
}
@keyframes hudDrop {
  from { opacity: 0; transform: translateY(-18px); }
  to { opacity: 1; transform: translateY(0); }
}
.titleblock {
  position: relative;
  min-height: 132px;
  padding: 20px 22px 18px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background:
    linear-gradient(135deg, rgba(12,17,29,.40), rgba(8,12,24,.76)),
    radial-gradient(circle at 18% 0%, var(--glow), transparent 44%),
    var(--panel-art) center / cover no-repeat;
  box-shadow: 0 24px 70px rgba(0,0,0,.48), inset 0 0 90px rgba(255,255,255,.04), 0 0 0 1px rgba(255,255,255,.04);
  backdrop-filter: blur(16px) saturate(1.3);
  overflow: hidden;
}
.titleblock::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(115deg, transparent 0 32%, rgba(255,255,255,.22) 38%, transparent 45%),
    repeating-linear-gradient(90deg, transparent 0 62px, rgba(255,255,255,.04) 63px, transparent 66px);
  mix-blend-mode: screen;
  opacity: .62;
}
.titleblock > * { position: relative; z-index: 1; }
.kicker {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  color: var(--accent);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: .08em;
  text-transform: uppercase;
}
h1 {
  margin: 8px 0 4px;
  font-size: clamp(31px, 5.4vw, 82px);
  line-height: .94;
  letter-spacing: 0;
  text-transform: uppercase;
  text-shadow: 0 0 18px var(--glow), 0 10px 30px rgba(0,0,0,.62);
}
.subtitle {
  color: var(--muted);
  margin: 0;
  font-size: clamp(14px, 1.7vw, 20px);
  max-width: 920px;
}
.controls {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 10px;
  max-width: 520px;
  position: relative;
  z-index: 5;
}
.btn {
  min-height: 46px;
  padding: 11px 16px;
  border: 1px solid rgba(255,255,255,.22);
  border-radius: 8px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.22), rgba(255,255,255,.07)),
    linear-gradient(135deg, rgba(8,14,28,.38), rgba(8,14,28,.78)),
    var(--panel-art) center / cover no-repeat;
  box-shadow: 0 14px 28px rgba(0,0,0,.36), inset 0 1px 0 rgba(255,255,255,.22);
  font-weight: 900;
  transition: transform 160ms ease, filter 160ms ease, box-shadow 160ms ease;
}
.btn:hover, .btn:focus-visible {
  outline: 2px solid var(--accent);
  transform: translateY(-1px);
  filter: brightness(1.08);
  box-shadow: 0 18px 36px rgba(0,0,0,.42), 0 0 22px var(--glow), inset 0 1px 0 rgba(255,255,255,.24);
}
.btn:active { transform: translateY(1px) scale(.99); }
.btn.primary {
  color: #121212;
  background: linear-gradient(135deg, var(--accent), #fff1a6 52%, #ffffff);
  box-shadow: 0 15px 30px rgba(0,0,0,.36), 0 0 24px var(--glow), inset 0 1px 0 rgba(255,255,255,.52);
}
.btn.warn {
  color: #191102;
  background: linear-gradient(135deg, #ffbf69, var(--accent3));
}
.btn.ghost {
  color: var(--muted);
  background: rgba(255,255,255,.04);
}
.scorebar {
  max-width: 1480px;
  margin: 0 auto 14px;
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 12px;
  align-items: stretch;
  animation: hudRise .82s cubic-bezier(.16, 1, .3, 1) .12s both;
}
@keyframes hudRise {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}
.teams {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
  gap: 10px;
}
.team {
  position: relative;
  min-height: 92px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background:
    linear-gradient(135deg, rgba(255,255,255,.11), rgba(5,9,18,.68)),
    radial-gradient(circle at 82% 0%, var(--glow), transparent 34%),
    var(--panel-art) center / cover no-repeat;
  box-shadow: 0 16px 35px rgba(0,0,0,.36), inset 0 0 55px rgba(255,255,255,.035);
  backdrop-filter: blur(13px) saturate(1.25);
}
.team.active {
  border-color: var(--accent);
  box-shadow: 0 0 28px var(--glow), inset 0 0 50px rgba(255,255,255,.04);
  animation: activePulse 1.9s ease-in-out infinite;
}
.team.solo {
  border-color: var(--accent2);
  box-shadow: 0 0 30px rgba(77,213,255,.22), inset 0 0 50px rgba(255,255,255,.04);
}
@keyframes activePulse {
  0%, 100% { filter: brightness(1); }
  50% { filter: brightness(1.12); }
}
.team input {
  width: 100%;
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 6px;
  padding: 7px 9px;
  color: var(--text);
  background: rgba(255,255,255,.07);
  font-weight: 800;
}
.score {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 10px;
  margin-top: 8px;
}
.score strong {
  color: var(--accent);
  font-size: 32px;
  line-height: 1;
  text-shadow: 0 0 16px var(--glow);
}
.score-actions {
  display: flex;
  gap: 6px;
}
.score-actions button {
  width: 34px;
  height: 34px;
  border-radius: 7px;
  background: rgba(255,255,255,.09);
  border: 1px solid rgba(255,255,255,.12);
  font-weight: 900;
}
.soundbox {
  width: 184px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background:
    linear-gradient(135deg, rgba(255,255,255,.1), rgba(6,10,20,.74)),
    var(--panel-art) center / cover no-repeat;
  padding: 10px;
  box-shadow: 0 16px 35px rgba(0,0,0,.34), inset 0 0 50px rgba(255,255,255,.03);
  backdrop-filter: blur(13px);
}
.equalizer {
  height: 42px;
  display: flex;
  align-items: end;
  gap: 5px;
  margin-top: 8px;
}
.equalizer span {
  flex: 1;
  min-width: 8px;
  border-radius: 3px 3px 0 0;
  background: linear-gradient(180deg, var(--accent), var(--accent2));
  transform-origin: bottom;
  animation: bars 900ms ease-in-out infinite;
  animation-play-state: paused;
}
.music-on .equalizer span { animation-play-state: running; }
.equalizer span:nth-child(2) { animation-delay: 120ms; }
.equalizer span:nth-child(3) { animation-delay: 240ms; }
.equalizer span:nth-child(4) { animation-delay: 80ms; }
.equalizer span:nth-child(5) { animation-delay: 180ms; }
@keyframes bars {
  0%, 100% { height: 15%; }
  45% { height: 95%; }
}
.board-wrap {
  max-width: 1480px;
  margin: 0 auto;
  overflow-x: auto;
  padding: clamp(38px, 5.2vw, 80px) clamp(28px, 6.4vw, 98px) clamp(48px, 6.4vw, 92px);
  perspective: 1700px;
  border-radius: 8px;
  position: relative;
  background:
    linear-gradient(180deg, rgba(1,4,12,.12), rgba(1,4,12,.44)),
    radial-gradient(circle at var(--spot-x) var(--spot-y), rgba(255,255,255,.10), transparent 28%),
    var(--board-frame) center / cover no-repeat;
  border: 1px solid rgba(255,255,255,.11);
  box-shadow: 0 34px 95px rgba(0,0,0,.64), 0 0 42px rgba(0,180,255,.12), inset 0 0 90px rgba(255,255,255,.03);
  backdrop-filter: blur(8px);
  animation: boardStageBoot 1.05s cubic-bezier(.16, 1, .3, 1) both, boardPower 6s ease-in-out 1.1s infinite;
}
.board-wrap::before,
.board-wrap::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
}
.board-wrap::before {
  background:
    linear-gradient(115deg, transparent 0 36%, rgba(255,255,255,.22) 45%, transparent 55%),
    radial-gradient(circle at var(--spot-x) var(--spot-y), rgba(255,209,102,.18), transparent 24%);
  mix-blend-mode: screen;
  opacity: .78;
  animation: boardSweep 4.6s ease-in-out infinite;
}
.board-wrap::after {
  box-shadow: inset 0 0 70px rgba(0,0,0,.55), inset 0 0 34px rgba(255,209,102,.10);
}
@keyframes boardStageBoot {
  from { opacity: 0; transform: perspective(1200px) rotateX(12deg) translateY(54px) scale(.94); filter: blur(10px) brightness(.82); }
  to { opacity: 1; transform: perspective(1200px) rotateX(0deg) translateY(0) scale(1); filter: blur(0) brightness(1); }
}
@keyframes boardPower {
  0%, 100% { box-shadow: 0 34px 95px rgba(0,0,0,.64), 0 0 38px rgba(0,180,255,.12), inset 0 0 90px rgba(255,255,255,.03); }
  50% { box-shadow: 0 38px 110px rgba(0,0,0,.68), 0 0 58px rgba(255,209,102,.18), inset 0 0 105px rgba(255,255,255,.05); }
}
@keyframes boardSweep {
  0%, 54%, 100% { transform: translateX(-45%); opacity: .18; }
  70% { transform: translateX(42%); opacity: .82; }
}
.board {
  width: 100%;
  min-width: min(940px, 100%);
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 12px;
  position: relative;
  z-index: 1;
  transform: rotateX(calc(2.6deg + var(--tilt-y))) rotateY(var(--tilt-x)) translateZ(0);
  transform-style: preserve-3d;
  transform-origin: center top;
  transition: transform 110ms linear;
  will-change: transform;
}
.cat, .tile {
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,.16);
  text-align: center;
  transform-style: preserve-3d;
  position: relative;
  overflow: hidden;
  opacity: 1;
  will-change: transform, filter;
}
body:not(.game-booted) .cat,
body:not(.game-booted) .tile {
  opacity: 0;
  animation: tileBoot .72s cubic-bezier(.16, 1, .3, 1) forwards;
  animation-delay: calc(var(--i, 0) * 34ms + 260ms);
}
body.game-booted .cat,
body.game-booted .tile:not(.used) {
  animation: tileLive calc(5.2s + var(--i, 0) * 70ms) ease-in-out infinite;
}
@keyframes tileBoot {
  from { opacity: 0; transform: translateY(32px) rotateX(18deg) scale(.86); filter: blur(8px) brightness(.7); }
  66% { opacity: 1; filter: blur(0) brightness(1.16); }
  to { opacity: 1; transform: translateY(0) rotateX(0deg) scale(1); filter: blur(0) brightness(1); }
}
@keyframes tileLive {
  0%, 100% { filter: brightness(1); }
  50% { filter: brightness(1.08) saturate(1.1); }
}
.cat {
  min-height: 82px;
  display: grid;
  place-items: center;
  padding: 10px;
  background:
    linear-gradient(135deg, rgba(255,255,255,.24), rgba(4,10,26,.48)),
    linear-gradient(135deg, color-mix(in srgb, var(--tile), transparent 12%), color-mix(in srgb, var(--tile2), transparent 20%)),
    var(--tile-art) center / cover no-repeat;
  text-transform: uppercase;
  font-size: clamp(14px, 1.5vw, 20px);
  font-weight: 950;
  line-height: 1.08;
  color: #fff8d8;
  text-shadow: 0 2px 0 rgba(0,0,0,.35);
  box-shadow: inset 0 0 28px rgba(255,255,255,.08), 0 12px 24px rgba(0,0,0,.32);
}
.tile {
  min-height: 88px;
  display: grid;
  place-items: center;
  padding: 8px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.28), rgba(255,255,255,.04) 40%, rgba(0,0,0,.18)),
    radial-gradient(circle at 50% 18%, rgba(255,255,255,.28), transparent 28%),
    linear-gradient(145deg, color-mix(in srgb, var(--tile), transparent 40%), color-mix(in srgb, var(--tile2), transparent 52%)),
    var(--tile-art) center / cover no-repeat;
  color: var(--accent);
  font-size: clamp(26px, 4.2vw, 48px);
  font-weight: 1000;
  text-shadow: 0 0 12px var(--glow), 0 2px 0 rgba(0,0,0,.55);
  box-shadow: 0 14px 22px rgba(0,0,0,.32), inset 0 0 42px rgba(255,255,255,.045);
  transition: transform 180ms ease, filter 180ms ease, box-shadow 180ms ease;
  isolation: isolate;
}
.tile::before {
  content: "";
  position: absolute;
  inset: -40%;
  z-index: -1;
  background:
    linear-gradient(115deg, transparent 0 36%, rgba(255,255,255,.28) 43%, transparent 51%),
    radial-gradient(circle at 50% 18%, rgba(255,255,255,.38), transparent 22%);
  transform: translateX(-36%) rotate(8deg);
  transition: transform 350ms ease;
}
.tile::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(100deg, transparent 0 38%, rgba(255,255,255,.30) 48%, transparent 58%),
    radial-gradient(circle at 50% 0%, rgba(255,255,255,.22), transparent 34%);
  mix-blend-mode: screen;
  opacity: .18;
  transform: translateX(-110%);
  animation: tileScan 3.7s ease-in-out infinite;
  animation-delay: calc(var(--i, 0) * 80ms);
}
@keyframes tileScan {
  0%, 58%, 100% { transform: translateX(-115%); opacity: 0; }
  68% { opacity: .45; }
  86% { transform: translateX(115%); opacity: 0; }
}
.tile:hover {
  transform: translateY(-4px) translateZ(34px) rotateX(-7deg);
  filter: brightness(1.15);
  box-shadow: 0 18px 34px rgba(0,0,0,.44), 0 0 30px var(--glow), inset 0 0 46px rgba(255,255,255,.07);
}
.tile:hover::before { transform: translateX(28%) rotate(8deg); }
.tile.selected {
  z-index: 5;
  animation: tileSelect .38s cubic-bezier(.16, 1, .3, 1) both !important;
}
@keyframes tileSelect {
  0% { transform: scale(1) translateZ(0); filter: brightness(1); }
  42% { transform: scale(1.1) translateZ(80px) rotateX(-10deg); filter: brightness(1.45); box-shadow: 0 0 44px var(--glow), 0 20px 50px rgba(0,0,0,.5); }
  100% { transform: scale(1.03) translateZ(16px); filter: brightness(1.2); }
}
.tile.used {
  color: rgba(255,255,255,.24);
  background:
    linear-gradient(135deg, rgba(0,0,0,.72), rgba(255,255,255,.035)),
    var(--tile-art) center / cover no-repeat;
  transform: none;
  box-shadow: inset 0 0 32px rgba(0,0,0,.35);
  cursor: not-allowed;
  animation: tileOff .42s ease-out both;
}
.tile.used::before { opacity: .08; }
.tile.used::after { opacity: 0; animation: none; }
@keyframes tileOff {
  from { filter: brightness(1.6); }
  to { filter: brightness(.72); }
}
.tile.daily::after {
  content: "DD";
  position: absolute;
  right: 8px;
  top: 8px;
  font-size: 12px;
  color: #111;
  background: var(--accent3);
  border-radius: 4px;
  padding: 2px 5px;
  opacity: .9;
}
.statusline {
  max-width: 1480px;
  margin: 8px auto 0;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  color: var(--muted);
  font-size: 14px;
}
.pill {
  border: 1px solid rgba(255,255,255,.14);
  background: rgba(255,255,255,.06);
  border-radius: 999px;
  padding: 7px 10px;
}
.modal {
  position: fixed;
  inset: 0;
  z-index: 30;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 18px;
  background:
    radial-gradient(circle at 50% 20%, rgba(255,209,102,.1), transparent 34%),
    rgba(2, 4, 10, .78);
  backdrop-filter: blur(14px) saturate(1.2);
}
.modal.show { display: flex; }
.dialog {
  width: min(980px, 100%);
  max-height: min(92vh, 880px);
  overflow: auto;
  border: 1px solid rgba(255,255,255,.28);
  border-radius: 10px;
  background:
    radial-gradient(circle at 14% 6%, rgba(255,255,255,.14), transparent 24%),
    linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,0) 32%),
    linear-gradient(145deg, rgba(6,10,22,.82), rgba(11,13,27,.95)),
    var(--panel-art) center / cover no-repeat;
  box-shadow: 0 34px 120px rgba(0,0,0,.72), 0 0 55px var(--glow), inset 0 1px 0 rgba(255,255,255,.12);
  transform: perspective(1200px) rotateX(4deg);
  animation: modalIn 220ms ease-out;
}
.modal[data-mode="daily"] .dialog {
  background:
    linear-gradient(180deg, rgba(6,9,18,.18), rgba(6,9,18,.58)),
    var(--daily-art) center / cover no-repeat;
}
.modal[data-mode="final"] .dialog {
  background:
    linear-gradient(180deg, rgba(6,9,18,.16), rgba(6,9,18,.62)),
    var(--final-art) center / cover no-repeat;
}
@keyframes modalIn {
  from { opacity: 0; transform: perspective(1200px) rotateX(18deg) scale(.92); }
  to { opacity: 1; transform: perspective(1200px) rotateX(4deg) scale(1); }
}

.score-result strong { color: var(--accent); }

.flash {

.hidden { display: none !important; }

  .tile { min-height: 76px; padding: 6px 4px; font-size: clamp(20px, 6vw, 34px); }

<script>
const GAME = {"slug":"day2-amendments-documents-laws","file":"Day 2 - Amendments Documents Laws Review Game.html","day":"Day 2 of 5","title":"Amendments, Documents, and Laws","subtitle":"27 Amendments, major documents, and landmark statutes","exam":"NYS U.S. History Regents - June 23, 2026 - 8:15 AM","palette":{"accent":"#f6c85f","accent2":"#2ec4b6","accent3":"#ff4f79","glow":"rgba(46, 196, 182, .42)","tile":"#214f8f","tile2":"#8f2d56"},"tokens":["1791","1868","1913","1920","1964","2010"],"final":{"category":"Constitutional Change","clue":"This formal procedure allows the Constitution to be changed after proposal and ratification.","answer":"Amendment process","aliases":["Amendment process","constitutional amendment process","amending the constitution","Article V","how to amend"],"explanation":"Article V establishes two paths to propose amendments — two-thirds vote of both houses of Congress, or a constitutional convention called by two-thirds of state legislatures — and requires ratification by three-fourths of states (38 of 50). This dual threshold of supermajority proposal and near-supermajority ratification makes the process deliberately difficult: over 11,000 amendments have been proposed since 1789, but only 27 ratified. The Regents tests Article V to assess understanding of constitutional flexibility versus stability — a core tension in American constitutional democracy.","rigor":{"value":"Final","skill":"answer one difficult course concept with one correct response","alignment":"NYS K-12 Social Studies Framework","examTarget":"NYS Social Studies Practices and Regents-style reasoning: evidence, chronology/causation, comparison/context, geography, economics, and civic participation"}},"categories":[{"name":"Amendment Match","clues":[{"value":100,"clue":"The first ten amendments are collectively known by this name.","answer":"Bill of Rights","explanation":"Ratified December 15, 1791, the Bill of Rights comprises the first ten amendments and was drafted by James Madison to satisfy Anti-Federalist demands for explicit protections against federal overreach. Core rights include freedom of speech, press, and religion (1st), protection from unreasonable searches (4th), due process and self-incrimination protections (5th), and the right to jury trial (6th). The Regents tests how the 14th Amendment's due-process clause later incorporated many of these rights against state governments.","sourceClue":"The first ten amendments are collectively known by this name.","sourceExplanation":"Ratified in 1791, they protect core liberties and were demanded by Anti-Federalists.","rigor":{"value":100,"skill":"identify key content","alignment":"NYS K-12 Social Studies Framework","examTarget":"NYS Social Studies Practices and Regents-style reasoning: evidence, chronology/causation, comparison/context, geography, economics, and civic participation","categoryQuality":"board-specific-category-v1"},"aliases":["Bill of Rights","Bill of Rights (1791)","first ten amendments","amendments 1-10","bill of rights"]},{"value":200,"clue":"This Reconstruction Amendment abolished slavery nationwide.","answer":"13th Amendment","explanation":"Ratified December 6, 1865, the 13th Amendment abolished slavery and involuntary servitude throughout the United States, permanently encoding what Lincoln's Emancipation Proclamation (1863) had proclaimed only for Confederate states. It was the first of the three Reconstruction Amendments (13th, 14th, 15th) designed to redeem the nation's founding promise of equality after the Civil War. The Regents distinguishes the Proclamation — a wartime executive order — from the 13th Amendment's constitutional permanence.","sourceClue":"This Reconstruction Amendment abolished slavery nationwide.","sourceExplanation":"The Emancipation Proclamation was a wartime order. The 13th Amendment made abolition constitutional and permanent.","rigor":{"value":200,"skill":"match content to unit context","alignment":"NYS K-12 Social Studies Framework","examTarget":"NYS Social Studies Practices and Regents-style reasoning: evidence, chronology/causation, comparison/context, geography, economics, and civic participation","categoryQuality":"board-specific-category-v1"},"aliases":["13th Amendment","Thirteenth Amendment","13th amendment","amendment XIII","abolition amendment"]},{"value":300,"clue":"This amendment contains citizenship, due process, and equal protection clauses.","answer":"14th Amendment","explanation":"Ratified July 9, 1868, the 14th Amendment overturned Dred Scott v. Sandford (1857) by declaring all persons born or naturalized in the U.S. citizens, and prohibiting states from denying due process or equal protection of the laws. Its Equal Protection Clause became the constitutional basis for Brown v. Board of Education (1954), and its Due Process Clause enabled incorporation of the Bill of Rights against state governments. The Regents identifies the 14th as the most litigated amendment in U.S. history.","sourceClue":"This amendment contains citizenship, due process, and equal protection clauses.","sourceExplanation":"The 14th Amendment overturned Dred Scott's citizenship logic and became the foundation of modern civil rights law.","rigor":{"value":300,"skill":"explain cause, effect, or turning point","alignment":"NYS K-12 Social Studies Framework","examTarget":"NYS Social Studies Practices and Regents-style reasoning: evidence, chronology/causation, comparison/context, geography, economics, and civic participation","categoryQuality":"board-specific-category-v1"},"aliases":["14th Amendment","Fourteenth Amendment","14th amendment","amendment XIV","equal protection amendment","due process amendment"]},{"value":400,"clue":"This amendment says voting rights cannot be denied because of race, color, or previous condition of servitude.","answer":"15th Amendment","explanation":"Ratified February 3, 1870, the 15th Amendment prohibited denial of the right to vote on account of race, color, or previous condition of servitude, formally enfranchising Black men. However, Southern states used poll taxes, literacy tests, grandfather clauses, and violence to systematically disenfranchise Black voters for nearly a century, until the Voting Rights Act of 1965 provided federal enforcement. The Regents pairs the 15th Amendment with the VRA to illustrate the gap between formal and substantive voting rights.","sourceClue":"This amendment says voting rights cannot be denied because of race, color, or previous condition of servitude.","sourceExplanation":"The 15th Amendment protected Black male suffrage, but poll taxes, literacy tests, and violence blocked full enforcement.","rigor":{"value":400,"skill":"connect evidence to a larger context","alignment":"NYS K-12 Social Studies Framework","examTarget":"NYS Social Studies Practices and Regents-style reasoning: evidence, chronology/causation, comparison/context, geography, economics, and civic participation","categoryQuality":"board-specific-category-v1"},"aliases":["15th Amendment","Fifteenth Amendment","15th amendment","amendment XV","Black male suffrage amendment"]},{"value":500,"clue":"These four Progressive Era amendments created income tax, direct election of senators, Prohibition, and women's suffrage.","answer":"16th, 17th, 18th, and 19th Amendments","explanation":"The four Progressive Era amendments — 16th (income tax, 1913), 17th (direct election of senators, 1913), 18th (Prohibition, 1919), and 19th (women's suffrage, 1920) — reflect the era's drive to democratize government, regulate capitalism, and enforce moral reform. The 16th gave Congress power to tax income without apportionment; the 17th removed state-legislature election of senators; the 18th banned alcohol (repealed by the 21st in 1933); the 19th capped 72 years of women's suffrage organizing. The Regents groups them to show how constitutional change accelerated in one decade.","sourceClue":"These four Progressive Era amendments created income tax, direct election of senators, Prohibition, and women's suffrage.","sourceExplanation":"Together they show the Progressive Era push for democracy, moral reform, and stronger federal capacity.","rigor":{"value":500,"skill":"synthesize a high-value exam pattern","alignment":"NYS K-12 Social Studies Framework","examTarget":"NYS Social Studies Practices and Regents-style reasoning: evidence, chronology/causation, comparison/context, geography, economics, and civic participation","categoryQuality":"board-specific-category-v1"},"aliases":["16th 17th 18th and 19th Amendments","Progressive Era amendments","16th through 19th amendments","four Progressive amendments","income tax amendment direct election prohibition women's suffrage"]}]},{"name":"Rights + Process","clues":[{"value":100,"clue":"This process uses the 14th Amendment to apply Bill of Rights protections to state governments.","answer":"Incorporation","explanation":"Incorporation is the legal process by which the Supreme Court, via the 14th Amendment's Due Process Clause, applied rights in the Bill of Rights against state (not just federal) governments. The Court began selectively incorporating rights in Gitlow v. New York (1925) and has since incorporated most of the Bill of Rights. The Regents uses incorporation to explain why, for example, a state cannot establish a religion (1st Amendment), conduct unreasonable searches (4th), or deprive someone of due process (5th/14th) even though the Bill of Rights originally addressed only federal power.","sourceClue":"This process uses the 14th Amendment to apply Bill of Rights protections to state governments.","sourceExplanation":"The Bill of Rights originally limited the federal government. Incorporation extended many rights against the states.","rigor":{"value":100,"skill":"identify key content","alignment":"NYS K-12 Social Studies Framework","examTarget":"NYS Social Studies Practices and Regents-style reasoning: evidence, chronology/causation, comparison/context, geography, economics, and civic participation","categoryQuality":"board-specific-category-v1"},"aliases":["Incorporation","incorporation doctrine","selective incorporation","14th Amendment incorporation","applying Bill of Rights to states"]},{"value":200,"clue":"This clause of the 14th Amendment is the basis for Brown, Loving, and many later civil-rights rulings.","answer":"Equal Protection Clause","explanation":"Section 1 of the 14th Amendment (1868) bars any state from denying 'equal protection of the laws' to any person within its jurisdiction, targeting Black Codes and post-Civil War racial discrimination. Courts apply three tiers of scrutiny: rational basis (economic/social laws), intermediate (sex-based laws), and strict scrutiny (race/national origin/fundamental rights). The Regents connects the Equal Protection Clause to Brown v. Board (1954), Plessy's overturn, and modern civil-rights cases involving race, sex, and disability.","sourceClue":"This clause of the 14th Amendment is the basis for Brown, Loving, and many later civil-rights rulings.","sourceExplanation":"Equal protection requires states to treat people equally under law.","rigor":{"value":200,"skill":"match content to unit context","alignment":"NYS K-12 Social Studies Framework","examTarget":"NYS Social Studies Practices and Regents-style reasoning: evidence, chronology/causation, comparison/context, geography, economics, and civic participation","categoryQuality":"board-specific-category-v1"},"aliases":["Equal Protection Clause","equal protection","equal protection of the laws","14th Amendment equal protection","equal protection clause (14th)"]},{"value":300,"clue":"This 1964 amendment abolished poll taxes in federal elections.","answer":"24th Amendment","explanation":"Ratified January 23, 1964, the 24th Amendment abolished poll taxes as a requirement for voting in federal elections, removing a key tool used across the Jim Crow South to disenfranchise Black and low-income voters since Reconstruction. The Voting Rights Act of 1965 went further, banning literacy tests and providing federal oversight of election administration in states with histories of discrimination. The Regents links the 24th Amendment to the broader civil-rights movement and the campaign to make the 15th Amendment's guarantee real.","sourceClue":"This 1964 amendment abolished poll taxes in federal elections.","sourceExplanation":"Poll taxes had been used to suppress Black voting rights, especially in the Jim Crow South.","rigor":{"value":300,"skill":"explain cause, effect, or turning point","alignment":"NYS K-12 Social Studies Framework","examTarget":"NYS Social Studies Practices and Regents-style reasoning: evidence, chronology/causation, comparison/context, geography, economics, and civic participation","categoryQuality":"board-specific-category-v1"},"aliases":["24th Amendment","Twenty-Fourth Amendment","24th amendment","poll tax amendment","amendment XXIV"]},{"value":400,"clue":"This 1971 amendment lowered the voting age from 21 to 18 during the Vietnam era.","answer":"26th Amendment","explanation":"Ratified July 1, 1971, the 26th Amendment lowered the national voting age from 21 to 18, motivated by the Vietnam War–era argument that young men drafted to fight and die had the right to vote on the leaders who sent them. The amendment was adopted in response to Oregon v. Mitchell (1970), where the Court ruled Congress could set voting age for federal but not state elections. The Regents pairs it with the 15th, 19th, and 24th amendments to trace how voting rights expanded incrementally over two centuries.","sourceClue":"This 1971 amendment lowered the voting age from 21 to 18 during the Vietnam era.","sourceExplanation":"Its slogan was 'old enough to fight, old enough to vote.'.","rigor":{"value":400,"skill":"connect evidence to a larger context","alignment":"NYS K-12 Social Studies Framework","examTarget":"NYS Social Studies Practices and Regents-style reasoning: evidence, chronology/causation, comparison/context, geography, economics, and civic participation","categoryQuality":"board-specific-category-v1"},"aliases":["26th Amendment","Twenty-Sixth Amendment","26th amendment","amendment XXVI","voting age amendment","18-year-old vote"]},{"value":500,"clue":"The amendment process is intentionally difficult: more than 11,000 proposed amendments, but only 27 ratified.","answer":"Three-fourths of the states","explanation":"Article V of the Constitution requires that amendments be ratified by three-fourths of state legislatures (or special conventions) — currently 38 of 50 states — after passage by two-thirds of both houses of Congress. This deliberately high threshold explains why only 27 amendments have been ratified despite more than 11,000 proposals, keeping constitutional change rare and broadly consensual. The Regents uses the amendment process to illustrate how the Framers balanced flexibility with stability in constitutional design.","sourceClue":"Article V requires proposal by two-thirds and ratification by this fraction of the states.","sourceExplanation":"The amendment process is intentionally difficult: more than 11,000 proposed amendments, but only 27 ratified.","rigor":{"value":500,"skill":"synthesize a high-value exam pattern","alignment":"NYS K-12 Social Studies Framework","examTarget":"NYS Social Studies Practices and Regents-style reasoning: evidence, chronology/causation, comparison/context, geography, economics, and civic participation","categoryQuality":"board-specific-category-v1"},"aliases":["Three-fourths of the states","three-fourths","38 states","3/4 of states","amendment ratification threshold"]}]},{"name":"Major Documents","clues":[{"value":100,"clue":"This 1776 document lists grievances against King George III and declares the colonies independent.","answer":"Declaration of Independence","explanation":"Adopted July 4, 1776, and primarily written by Thomas Jefferson, the Declaration of Independence justified American independence by invoking Locke's natural-rights philosophy: all men are created equal, with unalienable rights to life, liberty, and the pursuit of happiness, and governments derive just powers from the consent of the governed. It listed 27 specific grievances against King George III and appealed to the 'opinions of mankind.' The Regents distinguishes it from the Constitution: the Declaration is a statement of principles, not a governing framework.","sourceClue":"This 1776 document lists grievances against King George III and declares the colonies independent.","sourceExplanation":"It justifies revolution using natural rights and consent of the governed.","rigor":{"value":100,"skill":"identify key content","alignment":"NYS K-12 Social Studies Framework","examTarget":"NYS Social Studies Practices and Regents-style reasoning: evidence, chronology/causation, comparison/context, geography, economics, and civic participation","categoryQuality":"board-specific-category-v1"},"aliases":["Declaration of Independence","Declaration of Independence (1776)","declaration","the Declaration","Jefferson's declaration"]},{"value":200,"clue":"These 85 essays by Hamilton, Madison, and Jay argued for ratifying the Constitution.","answer":"Federalist Papers","explanation":"Written by Alexander Hamilton, James Madison, and John Jay under the pseudonym 'Publius' in 1787–1788, the 85 Federalist Papers argued for ratification of the Constitution in New York newspapers. Federalist No. 10 explained how a large republic can control factions better than a small democracy; Federalist No. 51 defended separation of powers with the phrase 'ambition must be made to counteract ambition.' The Regents uses the Papers as primary sources to understand the Framers' intent on constitutional principles like checks and balances and federalism.","sourceClue":"These 85 essays by Hamilton, Madison, and Jay argued for ratifying the Constitution.","sourceExplanation":"Federalist 10 explains factions; Federalist 51 explains checks and balances.","rigor":{"value":200,"skill":"match content to unit context","alignment":"NYS K-12 Social Studies Framework","examTarget":"NYS Social Studies Practices and Regents-style reasoning: evidence, chronology/causation, comparison/context, geography, economics, and civic participation","categoryQuality":"board-specific-category-v1"},"aliases":["Federalist Papers","The Federalist","Federalist Papers (1787-1788)","Federalist No. 10","Federalist 51","Hamilton Madison Jay essays"]},{"value":300,"clue":"This 1823 document warned Europe against new colonization in the Western Hemisphere.","answer":"Monroe Doctrine","explanation":"Declared by President James Monroe in his December 1823 annual message to Congress, the Monroe Doctrine warned European powers against further colonization or intervention in the Western Hemisphere, pledging U.S. non-interference in European affairs in return. Theodore Roosevelt expanded it with the Roosevelt Corollary (1904), asserting a U.S. right to intervene in Latin American nations that failed to maintain order or pay debts. The Regents identifies the Monroe Doctrine as the foundation of U.S. hemispheric policy and a key example of American nationalism and emerging imperialism.","sourceClue":"This 1823 document warned Europe against new colonization in the Western Hemisphere.","sourceExplanation":"It became the foundation of U.S. hemispheric policy and was later expanded by Theodore Roosevelt.","rigor":{"value":300,"skill":"explain cause, effect, or turning point","alignment":"NYS K-12 Social Studies Framework","examTarget":"NYS Social Studies Practices and Regents-style reasoning: evidence, chronology/causation, comparison/context, geography, economics, and civic participation","categoryQuality":"board-specific-category-v1"},"aliases":["Monroe Doctrine","Monroe Doctrine (1823)","Monroe's doctrine","Western Hemisphere policy","1823 foreign policy declaration"]},{"value":400,"clue":"This 1863 executive order changed the Civil War's purpose but applied only to Confederate-held territory.","answer":"Emancipation Proclamation","explanation":"Issued by President Abraham Lincoln on January 1, 1863, the Emancipation Proclamation declared enslaved people in Confederate states 'forever free' as a war measure under his commander-in-chief powers, transforming the Civil War's moral purpose. It did not free enslaved people in border states and had no immediate force in Confederate territory, but it authorized Black men to serve in the Union Army and deterred British recognition of the Confederacy. The Regents distinguishes it from the 13th Amendment (1865), which permanently abolished slavery throughout the nation by constitutional amendment.","sourceClue":"This 1863 executive order changed the Civil War's purpose but applied only to Confederate-held territory.","sourceExplanation":"It made the war also about ending slavery, allowed Black military service, and helped prevent European support for the Confederacy.","rigor":{"value":400,"skill":"connect evidence to a larger context","alignment":"NYS K-12 Social Studies Framework","examTarget":"NYS Social Studies Practices and Regents-style reasoning: evidence, chronology/causation, comparison/context, geography, economics, and civic participation","categoryQuality":"board-specific-category-v1"},"aliases":["Emancipation Proclamation","Emancipation Proclamation (1863)","Lincoln's proclamation","1863 proclamation","executive order freeing slaves"]},{"value":500,"clue":"This 1963 jailhouse text defended civil disobedience against unjust laws.","answer":"Letter from Birmingham Jail","explanation":"Written by Dr. Martin Luther King Jr. on April 16, 1963, from a Birmingham, Alabama jail cell, this open letter responded to white clergymen who called civil-rights demonstrations 'unwise and untimely.' King defended nonviolent direct action, distinguished just from unjust laws (drawing on Augustine and Aquinas), and argued that 'injustice anywhere is a threat to justice everywhere.' The Regents uses it as a primary source illustrating civil-disobedience theory, the urgency of racial equality, and the moral argument for the Civil Rights Act of 1964.","sourceClue":"This 1963 jailhouse text defended civil disobedience against unjust laws.","sourceExplanation":"Martin Luther King Jr. wrote it in response to critics who called civil-rights protests untimely.","rigor":{"value":500,"skill":"synthesize a high-value exam pattern","alignment":"NYS K-12 Social Studies Framework","examTarget":"NYS Social Studies Practices and Regents-style reasoning: evidence, chronology/causation, comparison/context, geography, economics, and civic participation","categoryQuality":"board-specific-category-v1"},"aliases":["Letter from Birmingham Jail","Letter from Birmingham Jail (1963)","Birmingham letter","MLK letter","King's Birmingham letter"]}]},{"name":"Landmark Laws","clues":[{"value":100,"clue":"This 1862 law offered 160 acres to settlers who lived on and improved western land.","answer":"Homestead Act","explanation":"Signed by President Lincoln on May 20, 1862, the Homestead Act granted 160 acres of public land to settlers who paid a small filing fee and farmed the land for five years. It accelerated westward migration and settlement of the Great Plains but displaced Native nations from their territories and dispossessed many as the frontier closed by 1890. The Regents connects the Homestead Act to Manifest Destiny, the growth of the transcontinental railroad, the destruction of the bison, and the reservation system as interrelated aspects of western expansion.","sourceClue":"This 1862 law offered 160 acres to settlers who lived on and improved western land.","sourceExplanation":"It encouraged Great Plains settlement but also accelerated Native displacement.","rigor":{"value":100,"skill":"identify key content","alignment":"NYS K-12 Social Studies Framework","examTarget":"NYS Social Studies Practices and Regents-style reasoning: evidence, chronology/causation, comparison/context, geography, economics, and civic participation","categoryQuality":"board-specific-category-v1"},"aliases":["Homestead Act","Homestead Act (1862)","homestead act","1862 land act","free land law"]},{"value":200,"clue":"These 1798 laws criminalized criticism of the government and became an early free-speech controversy.","answer":"Alien and Sedition Acts","explanation":"Passed by the Federalist-controlled Congress in 1798, the Alien and Sedition Acts extended the waiting period for citizenship to 14 years and made it a crime to criticize the federal government — used primarily against Democratic-Republican editors. The acts provoked the Virginia and Kentucky Resolutions (Madison and Jefferson), which asserted states' rights to nullify unconstitutional federal laws — an early articulation of nullification theory. The Regents uses them to examine the tension between national security and First Amendment freedoms, a recurring Enduring Issue.","sourceClue":"These 1798 laws criminalized criticism of the government and became an early free-speech controversy.","sourceExplanation":"Federalists used the Sedition Act against Democratic-Republican writers, raising First Amendment questions.","rigor":{"value":200,"skill":"match content to unit context","alignment":"NYS K-12 Social Studies Framework","examTarget":"NYS Social Studies Practices and Regents-style reasoning: evidence, chronology/causation, comparison/context, geography, economics, and civic participation","categoryQuality":"board-specific-category-v1"},"aliases":["Alien and Sedition Acts","Alien and Sedition Acts (1798)","sedition act","alien acts","1798 speech laws"]},{"value":300,"clue":"This 1882 law was the first major federal law banning immigration based on nationality.","answer":"Chinese Exclusion Act","explanation":"Signed by President Chester Arthur on May 6, 1882, the Chinese Exclusion Act was the first U.S. law to ban a specific ethnic group from immigration, barring Chinese laborers and denying Chinese immigrants the right to naturalize. It reflected anti-Chinese nativism following the completion of the transcontinental railroad (1869) and competition for jobs in the West. Repealed by the Magnuson Act in 1943 (during World War II), it stands as a stark example of immigration restriction rooted in racism — a Regents Enduring Issue of rights and discrimination.","sourceClue":"This 1882 law was the first major federal law banning immigration based on nationality.","sourceExplanation":"It reflected nativism and anti-Chinese prejudice after railroad labor and western job conflicts.","rigor":{"value":300,"skill":"explain cause, effect, or turning point","alignment":"NYS K-12 Social Studies Framework","examTarget":"NYS Social Studies Practices and Regents-style reasoning: evidence, chronology/causation, comparison/context, geography, economics, and civic participation","categoryQuality":"board-specific-category-v1"},"aliases":["Chinese Exclusion Act","Chinese Exclusion Act (1882)","exclusion act","1882 exclusion","Chinese immigration ban"]},{"value":400,"clue":"This 1890 law was the first federal antitrust law and targeted combinations in restraint of trade.","answer":"Sherman Antitrust Act","explanation":"Enacted July 2, 1890, the Sherman Antitrust Act was the first federal law to prohibit monopolistic business practices, declaring contracts or combinations 'in restraint of trade' illegal. Initially used more against labor unions than corporations, it became a powerful trust-busting tool under Theodore Roosevelt (who prosecuted 40+ cases, including Northern Securities Co. v. U.S., 1904) and William Howard Taft. The Regents links Sherman to the Gilded Age, muckraking journalism, and the Progressive movement's effort to rein in the power of industrial monopolies like Standard Oil.","sourceClue":"This 1890 law was the first federal antitrust law and targeted combinations in restraint of trade.","sourceExplanation":"It became a major weapon against monopolies, especially under Theodore Roosevelt and Taft.","rigor":{"value":400,"skill":"connect evidence to a larger context","alignment":"NYS K-12 Social Studies Framework","examTarget":"NYS Social Studies Practices and Regents-style reasoning: evidence, chronology/causation, comparison/context, geography, economics, and civic participation","categoryQuality":"board-specific-category-v1"},"aliases":["Sherman Antitrust Act","Sherman Act","Sherman Antitrust Act (1890)","antitrust act","trust-busting law"]},{"value":500,"clue":"This 1935 New Deal law created old-age pensions, unemployment insurance, and aid programs.","answer":"Social Security Act","explanation":"Signed by FDR on August 14, 1935, the Social Security Act created old-age retirement insurance, unemployment compensation, and Aid to Dependent Children — the foundation of America's modern welfare state and the New Deal's most enduring reform. The act initially excluded agricultural and domestic workers (disproportionately Black), reflecting compromises with Southern Democrats needed for passage. The Regents pairs Social Security with the Wagner Act and FDIC as evidence of how the New Deal permanently expanded the federal government's role in economic security.","sourceClue":"This 1935 New Deal law created old-age pensions, unemployment insurance, and aid programs.","sourceExplanation":"It became the cornerstone of the modern welfare state, though it excluded many farm and domestic workers at first.","rigor":{"value":500,"skill":"synthesize a high-value exam pattern","alignment":"NYS K-12 Social Studies Framework","examTarget":"NYS Social Studies Practices and Regents-style reasoning: evidence, chronology/causation, comparison/context, geography, economics, and civic participation","categoryQuality":"board-specific-category-v1"},"daily":true,"aliases":["Social Security Act","Social Security Act (1935)","Social Security","SSA 1935","New Deal social insurance"]}]},{"name":"Modern Rights Laws","clues":[{"value":100,"clue":"This 1964 law banned segregation in public accommodations and discrimination in employment.","answer":"Civil Rights Act of 1964","explanation":"Signed by President Lyndon B. Johnson on July 2, 1964, the Civil Rights Act of 1964 outlawed discrimination based on race, color, religion, sex, or national origin in public accommodations (Title II), employment (Title VII), and federally assisted programs (Title VI). It created the Equal Employment Opportunity Commission (EEOC) and was the legislative capstone of the Birmingham Campaign, March on Washington, and a decade of civil-rights activism. The Regents links it to the Equal Protection Clause, the 14th Amendment, and Supreme Court Commerce Clause power used to justify regulating private discrimination.","sourceClue":"This 1964 law banned segregation in public accommodations and discrimination in employment.","sourceExplanation":"Title II targeted public accommodations. Title VII targeted employment discrimination.","rigor":{"value":100,"skill":"identify key content","alignment":"NYS K-12 Social Studies Framework","examTarget":"NYS Social Studies Practices and Regents-style reasoning: evidence, chronology/causation, comparison/context, geography, economics, and civic participation","categoryQuality":"board-specific-category-v1"},"aliases":["Civil Rights Act of 1964","Civil Rights Act","CRA 1964","1964 Civil Rights Act","civil rights act"]},{"value":200,"clue":"This 1965 law banned literacy tests and created federal oversight of voting changes in covered areas.","answer":"Voting Rights Act of 1965","explanation":"Signed by President Johnson on August 6, 1965, following the Selma-to-Montgomery marches and 'Bloody Sunday' (March 7, 1965), the Voting Rights Act banned literacy tests, poll taxes in state elections, and other discriminatory devices, and required federal preclearance for voting-law changes in jurisdictions with histories of discrimination (Section 5). Black voter registration in the South doubled within years, transforming Southern politics. The Regents pairs the VRA with the 15th Amendment (1870) to show how constitutional rights required federal enforcement legislation nearly a century later.","sourceClue":"This 1965 law banned literacy tests and created federal oversight of voting changes in covered areas.","sourceExplanation":"It enforced the 15th Amendment and dramatically increased Black voter registration in the South.","rigor":{"value":200,"skill":"match content to unit context","alignment":"NYS K-12 Social Studies Framework","examTarget":"NYS Social Studies Practices and Regents-style reasoning: evidence, chronology/causation, comparison/context, geography, economics, and civic participation","categoryQuality":"board-specific-category-v1"},"aliases":["Voting Rights Act of 1965","Voting Rights Act","VRA 1965","1965 Voting Rights Act","VRA"]},{"value":300,"clue":"This 1965 law ended national-origins quotas and changed immigration patterns toward Asia, Africa, and Latin America.","answer":"Hart-Celler Immigration Act","explanation":"Signed by President Johnson on October 3, 1965, the Hart-Celler Act (Immigration and Nationality Act of 1965) abolished the national-origins quota system established by the Emergency Quota Act (1921) and Immigration Act of 1924, which had heavily favored Northern and Western European immigrants. The new system prioritized family reunification and skills, dramatically increasing immigration from Latin America, Asia, and Africa. The Regents uses Hart-Celler to explain post-1965 demographic shifts and the tension between nativist restriction and America's self-image as a 'nation of immigrants.'","sourceClue":"This 1965 law ended national-origins quotas and changed immigration patterns toward Asia, Africa, and Latin America.","sourceExplanation":"It replaced the 1920s quota system and transformed U.S. demographics.","rigor":{"value":300,"skill":"explain cause, effect, or turning point","alignment":"NYS K-12 Social Studies Framework","examTarget":"NYS Social Studies Practices and Regents-style reasoning: evidence, chronology/causation, comparison/context, geography, economics, and civic participation","categoryQuality":"board-specific-category-v1"},"aliases":["Hart-Celler Immigration Act","Immigration and Nationality Act of 1965","Hart-Celler Act","Immigration Act of 1965","1965 immigration reform"]},{"value":400,"clue":"This 1990 law banned discrimination against people with disabilities and required reasonable accommodations.","answer":"Americans with Disabilities Act","explanation":"Signed by President George H.W. Bush on July 26, 1990, the Americans with Disabilities Act (ADA) prohibits discrimination against people with disabilities in employment, public accommodations, transportation, and government services, requiring 'reasonable accommodations' and physical accessibility. Modeled on the Civil Rights Act of 1964, the ADA extended civil-rights protections to the approximately 43 million Americans with disabilities. The Regents uses the ADA to illustrate how the civil-rights framework — equal protection, access, and inclusion — expanded beyond race and sex to other protected classes.","sourceClue":"This 1990 law banned discrimination against people with disabilities and required reasonable accommodations.","sourceExplanation":"The ADA expanded civil rights protections to disability access in work and public life.","rigor":{"value":400,"skill":"connect evidence to a larger context","alignment":"NYS K-12 Social Studies Framework","examTarget":"NYS Social Studies Practices and Regents-style reasoning: evidence, chronology/causation, comparison/context, geography, economics, and civic participation","categoryQuality":"board-specific-category-v1"},"aliases":["Americans with Disabilities Act","ADA","Americans with Disabilities Act (1990)","ADA 1990","disability rights law"]},{"value":500,"clue":"This 2010 law protected pre-existing conditions and expanded federal involvement in health insurance.","answer":
