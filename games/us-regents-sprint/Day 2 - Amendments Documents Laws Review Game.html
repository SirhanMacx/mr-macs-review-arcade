const STORAGE_KEY = "us_history_review_game_" + GAME.slug;
const values = [100, 200, 300, 400, 500];
let state = loadState();
let pending = null;
let audio = { ctx: null, master: null, musicTimer: null, musicOn: false, step: 0 };
let transitionLock = false;

function defaultState(mode = "teams") {
  const solo = mode === "solo";
  return {
    mode: solo ? "solo" : "teams",
    names: solo ? ["Solo Player"] : ["Team 1", "Team 2"],
    scores: solo ? [0] : [0, 0],
    active: 0,
    used: [],
    finalPlayed: false
  };
}

function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (saved && Array.isArray(saved.names) && Array.isArray(saved.scores)) {
      saved.mode = saved.mode || (saved.names.length === 1 ? "solo" : "teams");
      if (!saved.names.length) saved.names = saved.mode === "solo" ? ["Solo Player"] : ["Team 1", "Team 2"];
      while (saved.scores.length < saved.names.length) saved.scores.push(0);
      saved.active = Math.min(Math.max(Number(saved.active) || 0, 0), saved.names.length - 1);
      return saved;
    }
  } catch (error) {}
  return defaultState();
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function clampNumber(value, min, max) {
  const n = Number(value);
  if (!Number.isFinite(n)) return min;
  return Math.max(min, Math.min(max, Math.round(n)));
}

function normalizeText(value) {
  return String(value || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/&/g, " and ")
    .replace(/\b(vs\.?|v\.)\b/g, " v ")
    .replace(/\bfirst\b/g, "1")
    .replace(/\bsecond\b/g, "2")
    .replace(/\bthird\b/g, "3")
    .replace(/\bfourth\b/g, "4")
    .replace(/\bfifth\b/g, "5")
    .replace(/\bsixth\b/g, "6")
    .replace(/\bseventh\b/g, "7")
    .replace(/\beighth\b/g, "8")
    .replace(/\bninth\b/g, "9")
    .replace(/\btenth\b/g, "10")
    .replace(/\beleventh\b/g, "11")
    .replace(/\btwelfth\b/g, "12")
    .replace(/\bthirteenth\b/g, "13")
    .replace(/\bfourteenth\b/g, "14")
    .replace(/\bfifteenth\b/g, "15")
    .replace(/\bsixteenth\b/g, "16")
    .replace(/\bseventeenth\b/g, "17")
    .replace(/\beighteenth\b/g, "18")
    .replace(/\bnineteenth\b/g, "19")
    .replace(/\btwenty[- ]?fourth\b/g, "24")
    .replace(/\btwenty[- ]?sixth\b/g, "26")
    .replace(/\b(\d+)(st|nd|rd|th)\b/g, "$1")
    .replace(/[^a-z0-9]+/g, " ")
    .replace(/\b(the|a|an|of|and|to|for|in|on|by|with|jr|sr)\b/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function compactText(value) {
  return normalizeText(value).replace(/\s+/g, "");
}

function unique(values) {
  return [...new Set(values.map(normalizeText).filter(Boolean))];
}

function answerVariants(answer, extra) {
  const raw = String(answer || "");
  const variants = [raw, ...(extra || [])];
  raw.split(/\s*(?:->|\/|;)\s*/).forEach((part) => variants.push(part));
  variants.push(raw.replace(/\bact\b/ig, ""));
  variants.push(raw.replace(/\bamendment(s)?\b/ig, ""));
  variants.push(raw.replace(/\bdoctrine\b/ig, ""));
  variants.push(raw.replace(/\bmovement\b/ig, ""));
  variants.push(raw.replace(/\bv\.?\b/ig, " versus "));
  variants.push(raw.replace(/\bversus\b/ig, " v "));
  if (/v\.?/i.test(raw)) {
    const pieces = raw.split(/\bv\.?\b/i).map((part) => part.trim());
    variants.push(...pieces);
    variants.push(pieces.join(" "));
  }
  const n = normalizeText(raw);
  if (n.includes("13") && n.includes("14") && n.includes("15")) variants.push("Reconstruction Amendments", "13 14 15");
  if (n.includes("16") && n.includes("17") && n.includes("18") && n.includes("19")) variants.push("Progressive Amendments", "16 17 18 19");
  if (n.includes("civil rights act") && n.includes("voting rights act")) variants.push("Civil Rights Act Voting Rights Act", "CRA VRA");
  if (n.includes("declaration independence")) variants.push("Declaration");
  if (n.includes("affordable care act")) variants.push("ACA", "Obamacare");
  if (n.includes("district columbia heller")) variants.push("DC v Heller", "Heller");
  if (n.includes("students fair admissions")) variants.push("SFFA", "SFFA v Harvard");
  if (n.includes("letter birmingham jail")) variants.push("Birmingham Jail", "MLK Letter");
  if (n.includes("emancipation proclamation")) variants.push("Emancipation");
  if (n.includes("articles confederation")) variants.push("AOC");
  if (n.includes("alien sedition")) variants.push("Sedition Act", "Alien Acts");
  return unique(variants);
}

function tokenSet(value) {
  return new Set(normalizeText(value).split(" ").filter((token) => token.length > 1));
}

function diceSimilarity(a, b) {
  const aa = compactText(a);
  const bb = compactText(b);
  if (!aa || !bb) return 0;
  if (aa === bb) return 1;
  if (aa.length < 3 || bb.length < 3) return aa === bb ? 1 : 0;
  const grams = (text) => {
    const out = new Map();
    for (let i = 0; i < text.length - 1; i++) {
      const gram = text.slice(i, i + 2);
      out.set(gram, (out.get(gram) || 0) + 1);
    }
    return out;
  };
  const left = grams(aa);
  const right = grams(bb);
  let overlap = 0;
  left.forEach((count, gram) => {
    overlap += Math.min(count, right.get(gram) || 0);
  });
  return (2 * overlap) / Math.max(1, aa.length + bb.length - 2);
}

function answerScore(response, clue) {
  const typed = normalizeText(response);
  if (!typed) return { score: 0, verdict: "blank", matched: "", confidence: "No answer typed." };
  const variants = answerVariants(clue.answer, clue.aliases);
  let best = { score: 0, matched: "" };
  for (const variant of variants) {
    const v = normalizeText(variant);
    if (!v) continue;
    const typedCompact = compactText(typed);
    const variantCompact = compactText(v);
    let score = diceSimilarity(typed, v);
    if (typedCompact === variantCompact) score = 1;
    if (typedCompact.length >= 4 && variantCompact.includes(typedCompact)) score = Math.max(score, .9);
    if (variantCompact.length >= 4 && typedCompact.includes(variantCompact)) score = Math.max(score, .92);
    const typedTokens = tokenSet(typed);
    const answerTokens = tokenSet(v);
    const overlap = [...answerTokens].filter((token) => typedTokens.has(token)).length;
    const coverage = answerTokens.size ? overlap / answerTokens.size : 0;
    if (coverage >= .8 && overlap >= 1) score = Math.max(score, .88);
    if (coverage >= .6 && overlap >= 2) score = Math.max(score, .78);
    if (score > best.score) best = { score, matched: variant };
  }
  let verdict = "manual";
  if (best.score >= .78) verdict = "correct";
  else if (best.score <= .38) verdict = "wrong";
  return {
    score: best.score,
    verdict,
    matched: best.matched,
    confidence: Math.round(best.score * 100) + "% match"
  };
}

function flashScreen(kind) {
  const flash = document.getElementById("flash");
  flash.className = "flash " + (kind || "");
  void flash.offsetWidth;
  flash.classList.add("play");
}

function teamName(index) {
  return state.names[index] || ("Team " + (index + 1));
}

function isSoloMode() {
  return state.mode === "solo" || state.names.length === 1;
}

function renderTeams() {
  const root = document.getElementById("teams");
  root.innerHTML = "";
  state.names.forEach((name, index) => {
    const card = document.createElement("div");
    const solo = isSoloMode();
    card.className = "team" + (index === state.active ? " active" : "") + (solo ? " solo" : "");
    const activeButton = solo ? "" : '<button title="Make active team" data-active="' + index + '">A</button>';
    card.innerHTML =
      '<input aria-label="' + (solo ? "Player name" : "Team name") + '" value="' + escapeHtml(name) + '" data-name="' + index + '">' +
      '<div class="score">' +
      '<strong>$' + state.scores[index] + '</strong>' +
      '<div class="score-actions">' +
      activeButton +
      '<button title="Add 100" data-bump="' + index + '" data-delta="100">+</button>' +
      '<button title="Subtract 100" data-bump="' + index + '" data-delta="-100">-</button>' +
      '</div></div>';
    root.appendChild(card);
  });
  root.querySelectorAll("[data-name]").forEach((input) => {
    input.addEventListener("input", (event) => {
      const index = Number(event.target.dataset.name);
      state.names[index] = event.target.value || (isSoloMode() ? "Solo Player" : ("Team " + (index + 1)));
      saveState();
      updateStatus();
    });
  });
  root.querySelectorAll("[data-active]").forEach((button) => {
    button.addEventListener("click", () => {
      state.active = Number(button.dataset.active);
      playSfx("select");
      saveState();
      renderAll();
    });
  });
  root.querySelectorAll("[data-bump]").forEach((button) => {
    button.addEventListener("click", () => {
      const index = Number(button.dataset.bump);
      const delta = Number(button.dataset.delta);
      state.scores[index] += delta;
      playSfx(delta > 0 ? "correct" : "wrong");
      saveState();
      renderAll();
    });
  });
}

function clueKey(catIndex, clueIndex) {
  return catIndex + "-" + clueIndex;
}

function renderBoard() {
  const board = document.getElementById("board");
  board.innerHTML = "";
  let index = 0;
  GAME.categories.forEach((category) => {
    const cell = document.createElement("div");
    cell.className = "cat";
    cell.style.setProperty("--i", index++);
    cell.textContent = category.name;
    board.appendChild(cell);
  });
  values.forEach((value, row) => {
    GAME.categories.forEach((category, catIndex) => {
      const clue = category.clues[row];
      const key = clueKey(catIndex, row);
      const tile = document.createElement("button");
      tile.className = "tile" + (state.used.includes(key) ? " used" : "") + (clue.daily ? " daily" : "");
      tile.textContent = state.used.includes(key) ? "" : "$" + clue.value;
      const tileLabel = category.name + ", $" + clue.value + (clue.daily ? ", Daily Double" : "");
      tile.setAttribute("aria-label", state.used.includes(key) ? tileLabel + ", completed" : tileLabel);
      tile.disabled = state.used.includes(key);
      tile.dataset.key = key;
      tile.style.setProperty("--i", index++);
      tile.addEventListener("click", () => openClue(catIndex, row));
      board.appendChild(tile);
    });
  });
}

function updateStatus() {
  const solo = isSoloMode();
  document.getElementById("activeStatus").textContent = solo ? "Solo player: " + teamName(0) : "Active team: " + teamName(state.active);
  document.getElementById("progressStatus").textContent = state.used.length + " of 25 clues complete";
  document.getElementById("finalBtn").disabled = state.finalPlayed;
  document.getElementById("finalBtn").textContent = state.finalPlayed ? "Final Played" : "Final Jeopardy";
  document.getElementById("soloBtn").textContent = solo ? "Team Play" : "Solo Play";
  document.getElementById("addTeamBtn").disabled = solo;
}

function renderAll() {
  renderTeams();
  renderBoard();
  updateStatus();
}

function openModal(title, meta, bodyHtml, mode) {
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalMeta").textContent = meta;
  document.getElementById("modalBody").innerHTML = bodyHtml;
  document.getElementById("modal").dataset.mode = mode || "clue";
  document.getElementById("modal").classList.add("show");
  transitionLock = false;
}

function closeModal() {
  document.getElementById("modal").classList.remove("show");
  document.getElementById("modal").dataset.mode = "";
  pending = null;
  transitionLock = false;
}

function animateTileSelection(key) {
  const tile = document.querySelector('[data-key="' + key + '"]');
  if (!tile) return;
  tile.classList.add("selected");
  setTimeout(() => tile.classList.remove("selected"), 520);
}

function openClue(catIndex, clueIndex) {
  if (transitionLock) return;
  const clue = GAME.categories[catIndex].clues[clueIndex];
  const key = clueKey(catIndex, clueIndex);
  if (state.used.includes(key)) return;
  transitionLock = true;
  pending = {
    type: "clue",
    key,
    catIndex,
    clueIndex,
    clue,
    value: clue.value,
    team: state.active
  };
  animateTileSelection(key);
  if (clue.daily) {
    playSfx("daily");
    const max = Math.max(500, Math.abs(state.scores[state.active]));
    setTimeout(() => {
      openModal("Daily Double", GAME.categories[catIndex].name + " - " + teamName(state.active),
        '<div class="clue-text">Daily Double. Enter a wager before the clue.</div>' +
        '<div class="wager-grid"><div class="wager-card"><label>Wager for ' + escapeHtml(teamName(state.active)) + '</label>' +
        '<input id="dailyWager" type="number" min="0" max="' + max + '" value="' + Math.min(max, clue.value) + '"></div></div>' +
        '<div class="action-row"><button class="btn primary" id="startDaily">Reveal Clue</button></div>', "daily");
      document.getElementById("startDaily").addEventListener("click", () => {
        pending.value = clampNumber(document.getElementById("dailyWager").value, 0, max);
        showClue();
      });
    }, 320);
  } else {
    playSfx("select");
    setTimeout(showClue, 260);
  }
}

function showClue() {
  const clue = pending.clue;
  openModal(GAME.categories[pending.catIndex].name, "$" + pending.value + " - " + teamName(pending.team),
    '<div class="clue-text">' + escapeHtml(clue.clue) + '</div>' +
    '<div style="margin-top:14px"><input class="quick-answer" id="studentAnswer" autocomplete="off" placeholder="Type the team response, then Auto Score"></div>' +
    '<div class="auto-meter" id="liveMeter"><div class="meter-track"><div class="meter-fill" id="meterFill"></div></div><span id="meterText">Waiting for response</span></div>' +
    '<div class="action-row">' +
    '<button class="btn primary" id="autoScore">Auto Score</button>' +
    '<button class="btn" id="revealAnswer">Reveal / Teacher Score</button>' +
    '<button class="btn ghost" id="skipClue">No Score</button>' +
    '</div>' +
    '<div id="answerArea" class="hidden"></div>', "clue");
  document.getElementById("autoScore").addEventListener("click", autoScoreClue);
  document.getElementById("revealAnswer").addEventListener("click", revealAnswer);
  document.getElementById("skipClue").addEventListener("click", () => finishClue(0));
  document.getElementById("studentAnswer").addEventListener("input", previewScore);
  document.getElementById("studentAnswer").addEventListener("keydown", (event) => {
    if (event.key === "Enter") autoScoreClue();
  });
  setTimeout(() => {
    const input = document.getElementById("studentAnswer");
    if (input) input.focus();
  }, 60);
}

function previewScore() {
  if (!pending || !pending.clue) return;
  const input = document.getElementById("studentAnswer");
  const fill = document.getElementById("meterFill");
  const text = document.getElementById("meterText");
  if (!input || !fill || !text) return;
  const result = answerScore(input.value, pending.clue);
  const pct = Math.round(result.score * 100);
  fill.style.width = pct + "%";
  text.textContent = result.verdict === "correct" ? "Likely correct" : result.verdict === "wrong" ? "Likely wrong" : result.verdict === "blank" ? "Waiting for response" : "Needs judge";
}

function autoScoreClue() {
  if (!pending || !pending.clue) return;
  const input = document.getElementById("studentAnswer");
  const response = input ? input.value : "";
  const result = answerScore(response, pending.clue);
  if (result.verdict === "manual") {
    showAnswerResult(0, "judge", result, response, false);
    playSfx("judge");
    return;
  }
  const delta = result.verdict === "correct" ? pending.value : -pending.value;
  showAnswerResult(delta, result.verdict === "correct" ? "good" : "bad", result, response, true);
  flashScreen(result.verdict === "correct" ? "good" : "bad");
}

function revealAnswer() {
  playSfx("reveal");
  const input = document.getElementById("studentAnswer");
  const response = input ? input.value : "";
  const result = answerScore(response, pending.clue);
  showAnswerResult(0, "judge", result, response, false);
}

function showAnswerResult(delta, mode, result, response, autoApply) {
  const clue = pending.clue;
  const area = document.getElementById("answerArea");
  area.className = "answer-box " + mode;
  const verdictLabel = mode === "good" ? "Auto Scored Correct" : mode === "bad" ? "Auto Scored Wrong" : "Teacher Review";
  const deltaText = delta > 0 ? "+" + delta : delta < 0 ? String(delta) : "0";
  const responseLine = response ? '<p><strong>Typed response:</strong> ' + escapeHtml(response) + '</p>' : '<p><strong>Typed response:</strong> blank</p>';
  const matchLine = result && result.matched ? '<p><strong>Closest match:</strong> ' + escapeHtml(result.matched) + ' · ' + escapeHtml(result.confidence) + '</p>' : '<p><strong>Auto confidence:</strong> ' + escapeHtml(result ? result.confidence : "not checked") + '</p>';
  area.innerHTML =
    '<h3>' + verdictLabel + '</h3>' +
    '<p><strong>Score change:</strong> ' + deltaText + '</p>' +
    responseLine +
    matchLine +
    '<h3>Correct Response</h3>' +
    '<p><strong>' + escapeHtml(clue.answer) + '</strong></p>' +
    '<h3>Why It Matters</h3>' +
    '<p>' + escapeHtml(clue.explanation) + '</p>' +
    ((clue.aliases && clue.aliases.length) ? '<div class="accepted-answers"><strong>Also accepted:</strong> ' + clue.aliases.map(function(a){return '<span class="alias-chip">' + escapeHtml(a) + '</span>';}).join('') + '</div>' : '') +
    '<div class="action-row">' +
    (autoApply ? '<button class="btn primary" id="keepAutoScore">Keep Score / Continue</button>' : '') +
    '<button class="btn primary" id="markCorrect">Override Correct: +' + pending.value + '</button>' +
    '<button class="btn warn" id="markWrong">Override Wrong: -' + pending.value + '</button>' +
    '<button class="btn ghost" id="markNoScore">No Score</button>' +
    '</div>';
  if (autoApply) {
    applyClueScore(delta);
    document.getElementById("keepAutoScore").addEventListener("click", closeModal);
    document.getElementById("markCorrect").addEventListener("click", () => adjustAppliedScore(pending.value));
    document.getElementById("markWrong").addEventListener("click", () => adjustAppliedScore(-pending.value));
    document.getElementById("markNoScore").addEventListener("click", () => adjustAppliedScore(0));
  } else {
    document.getElementById("markCorrect").addEventListener("click", () => finishClue(pending.value));
    document.getElementById("markWrong").addEventListener("click", () => finishClue(-pending.value));
    document.getElementById("markNoScore").addEventListener("click", () => finishClue(0));
  }
}

function applyClueScore(delta) {
  if (!pending) return;
  if (pending.scored) return;
  if (!state.used.includes(pending.key)) state.used.push(pending.key);
  state.scores[pending.team] += delta;
  pending.scored = true;
  pending.appliedDelta = delta;
  if (delta > 0) playSfx("correct");
  if (delta < 0) playSfx("wrong");
  if (state.names.length > 1) state.active = (pending.team + 1) % state.names.length;
  saveState();
  renderAll();
}

function adjustAppliedScore(newDelta) {
  if (!pending || !pending.scored) return;
  state.scores[pending.team] += newDelta - (pending.appliedDelta || 0);
  pending.appliedDelta = newDelta;
  if (newDelta > 0) playSfx("correct");
  if (newDelta < 0) playSfx("wrong");
  saveState();
  closeModal();
  renderAll();
}

function finishClue(delta) {
  applyClueScore(delta);
  closeModal();
}

function openFinal() {
  if (state.finalPlayed) return;
  playSfx("final");
  const cards = state.names.map((name, index) => {
    const cap = Math.max(500, state.scores[index]);
    return '<div class="wager-card"><label>' + escapeHtml(name) + ' wager (max $' + cap + ')</label>' +
      '<input type="number" min="0" max="' + cap + '" value="0" data-final-wager="' + index + '"></div>';
  }).join("");
  openModal("Final Jeopardy", GAME.final.category,
    '<div class="clue-text">' + (isSoloMode() ? "Lock your wager. Then reveal the final clue." : "Lock each team wager. Then reveal the final clue.") + '</div>' +
    '<div class="wager-grid">' + cards + '</div>' +
    '<div class="action-row"><button class="btn primary" id="lockFinal">Reveal Final Clue</button></div>', "final");
  document.getElementById("lockFinal").addEventListener("click", lockFinal);
}

function lockFinal() {
  const wagers = [];
  document.querySelectorAll("[data-final-wager]").forEach((input) => {
    const index = Number(input.dataset.finalWager);
    const cap = Math.max(500, state.scores[index]);
    wagers[index] = clampNumber(input.value, 0, cap);
  });
  pending = { type: "final", wagers, marks: Array(state.names.length).fill(null) };
  const answers = state.names.map((name, index) =>
    '<div class="wager-card"><label>' + escapeHtml(name) + ' response</label><textarea data-final-answer="' + index + '"></textarea></div>'
  ).join("");
  openModal("Final Jeopardy", GAME.final.category,
    '<div class="clue-text">' + escapeHtml(GAME.final.clue) + '</div>' +
    '<div class="final-grid">' + answers + '</div>' +
    '<div class="action-row"><button class="btn primary" id="revealFinalAnswer">Reveal Final Answer</button></div>' +
    '<div id="finalAnswerArea" class="hidden"></div>', "final");
  document.getElementById("revealFinalAnswer").addEventListener("click", revealFinalAnswer);
}

function revealFinalAnswer() {
  playSfx("reveal");
  const finalChecks = state.names.map((name, index) => {
    const answerBox = document.querySelector('[data-final-answer="' + index + '"]');
    const response = answerBox ? answerBox.value : "";
    const result = answerScore(response, GAME.final);
    pending.marks[index] = result.verdict === "correct" ? true : result.verdict === "wrong" ? false : null;
    return { response, result };
  });
  const rows = state.names.map((name, index) => {
    const check = finalChecks[index];
    const guess = check.response ? escapeHtml(check.response) : "blank";
    const auto = pending.marks[index] === true ? "auto: correct" : pending.marks[index] === false ? "auto: wrong" : "auto: needs judge";
    return '<div class="score-result" data-final-row="' + index + '"><strong>' + escapeHtml(name) + '</strong><span class="tiny">' + auto + ' · ' + escapeHtml(check.result.confidence) + '<br>Response: ' + guess + '</span><button class="btn primary" data-final-mark="' + index + '" data-ok="1">Correct</button><button class="btn warn" data-final-mark="' + index + '" data-ok="0">Wrong</button></div>';
  }).join("");
  const area = document.getElementById("finalAnswerArea");
  area.className = "answer-box";
  area.innerHTML =
    '<h3>Correct Response</h3><p><strong>' + escapeHtml(GAME.final.answer) + '</strong></p>' +
    '<h3>Why It Matters</h3><p>' + escapeHtml(GAME.final.explanation) + '</p>' +
    ((GAME.final.aliases && GAME.final.aliases.length) ? '<div class="accepted-answers"><strong>Also accepted:</strong> ' + GAME.final.aliases.map(function(a){return '<span class="alias-chip">' + escapeHtml(a) + '</span>';}).join('') + '</div>' : '') +
    rows +
    '<div class="action-row"><button class="btn primary" id="applyFinal">Apply Final Scores</button></div>';
  area.querySelectorAll("[data-final-mark]").forEach((button) => {
    button.addEventListener("click", () => {
      const index = Number(button.dataset.finalMark);
      pending.marks[index] = button.dataset.ok === "1";
      button.parentElement.querySelectorAll("button").forEach((b) => b.style.outline = "none");
      button.style.outline = "2px solid var(--accent)";
      playSfx(button.dataset.ok === "1" ? "correct" : "wrong");
    });
    const index = Number(button.dataset.finalMark);
    if ((pending.marks[index] === true && button.dataset.ok === "1") || (pending.marks[index] === false && button.dataset.ok === "0")) {
      button.style.outline = "2px solid var(--accent)";
    }
  });
  document.getElementById("applyFinal").addEventListener("click", applyFinal);
}

function applyFinal() {
  if (!pending || pending.type !== "final") return;
  state.names.forEach((name, index) => {
    if (pending.marks[index] === true) state.scores[index] += pending.wagers[index] || 0;
    if (pending.marks[index] === false) state.scores[index] -= pending.wagers[index] || 0;
  });
  state.finalPlayed = true;
  playSfx("final");
  saveState();
  closeModal();
  renderAll();
}

function addTeam() {
  if (isSoloMode()) return;
  if (state.names.length >= 4) return;
  state.names.push("Team " + (state.names.length + 1));
  state.scores.push(0);
  saveState();
  renderAll();
}

function toggleSoloMode() {
  const nextMode = isSoloMode() ? "teams" : "solo";
  const hasProgress = state.used.length || state.finalPlayed || state.scores.some((score) => score !== 0);
  if (hasProgress && !confirm("Switch play modes and reset this game's board and scores?")) return;
  state = defaultState(nextMode);
  saveState();
  playSfx("select");
  renderAll();
}

function resetGame() {
  if (!confirm("Reset this game's board and scores?")) return;
  state = defaultState(isSoloMode() ? "solo" : "teams");
  saveState();
  playSfx("reset");
  renderAll();
}

function ensureAudio() {
  if (audio.ctx) return;
  const Ctx = window.AudioContext || window.webkitAudioContext;
  if (!Ctx) return;
  audio.ctx = new Ctx();
  audio.compressor = audio.ctx.createDynamicsCompressor();
  audio.compressor.threshold.value = -20;
  audio.compressor.knee.value = 18;
  audio.compressor.ratio.value = 7;
  audio.compressor.attack.value = .006;
  audio.compressor.release.value = .2;
  audio.master = audio.ctx.createGain();
  audio.master.gain.value = .16;
  audio.master.connect(audio.compressor);
  audio.compressor.connect(audio.ctx.destination);
}

function tone(freq, duration, type, gainValue, delay, bendTo) {
  ensureAudio();
  if (!audio.ctx) return;
  if (audio.ctx.state === "suspended") audio.ctx.resume();
  const now = audio.ctx.currentTime + (delay || 0);
  const osc = audio.ctx.createOscillator();
  const gain = audio.ctx.createGain();
  osc.type = type || "sine";
  osc.frequency.setValueAtTime(freq, now);
  if (bendTo) osc.frequency.exponentialRampToValueAtTime(Math.max(20, bendTo), now + duration);
  gain.gain.setValueAtTime(.0001, now);
  gain.gain.exponentialRampToValueAtTime(gainValue || .12, now + .012);
  gain.gain.exponentialRampToValueAtTime(.0001, now + duration);
  osc.connect(gain);
  gain.connect(audio.master);
  osc.start(now);
  osc.stop(now + duration);
}

function pluck(freq, delay, gainValue, duration) {
  ensureAudio();
  if (!audio.ctx) return;
  if (audio.ctx.state === "suspended") audio.ctx.resume();
  const now = audio.ctx.currentTime + (delay || 0);
  const end = now + (duration || .48);
  const osc = audio.ctx.createOscillator();
  const overtone = audio.ctx.createOscillator();
  const filter = audio.ctx.createBiquadFilter();
  const gain = audio.ctx.createGain();
  osc.type = "triangle";
  overtone.type = "sine";
  osc.frequency.setValueAtTime(freq, now);
  overtone.frequency.setValueAtTime(freq * 2.01, now);
  filter.type = "lowpass";
  filter.frequency.setValueAtTime(2600, now);
  filter.frequency.exponentialRampToValueAtTime(520, end);
  gain.gain.setValueAtTime(.0001, now);
  gain.gain.exponentialRampToValueAtTime(gainValue || .04, now + .012);
  gain.gain.exponentialRampToValueAtTime(.0001, end);
  osc.connect(filter);
  overtone.connect(filter);
  filter.connect(gain);
  gain.connect(audio.master);
  osc.start(now);
  overtone.start(now);
  osc.stop(end);
  overtone.stop(end);
}

function sweep(from, to, duration, gainValue, delay, type) {
  tone(from, duration, type || "sine", gainValue || .045, delay || 0, to);
}

function noise(duration, gainValue, delay, filterFreq, filterType) {
  ensureAudio();
  if (!audio.ctx) return;
  if (audio.ctx.state === "suspended") audio.ctx.resume();
  const now = audio.ctx.currentTime + (delay || 0);
  const length = Math.max(1, Math.floor(audio.ctx.sampleRate * duration));
  const buffer = audio.ctx.createBuffer(1, length, audio.ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 1.2);
  const source = audio.ctx.createBufferSource();
  const filter = audio.ctx.createBiquadFilter();
  const gain = audio.ctx.createGain();
  source.buffer = buffer;
  filter.type = filterType || "bandpass";
  filter.frequency.value = filterFreq || 900;
  filter.Q.value = .9;
  gain.gain.setValueAtTime(gainValue || .06, now);
  gain.gain.exponentialRampToValueAtTime(.0001, now + duration);
  source.connect(filter);
  filter.connect(gain);
  gain.connect(audio.master);
  source.start(now);
  source.stop(now + duration);
}

function chord(notes, duration, type, gain, delay) {
  notes.forEach((note, i) => tone(note, duration, type || "triangle", (gain || .05) / Math.max(1, notes.length * .7), (delay || 0) + i * .012));
}

function playSfx(kind) {
  if (kind === "select") {
    pluck(523.25, 0, .035, .18);
    pluck(783.99, .045, .022, .18);
  }
  if (kind === "reveal") {
    noise(.28, .034, 0, 2200, "highpass");
    sweep(140, 520, .42, .04, 0, "sine");
    chord([261.63, 392, 523.25, 659.25], .42, "triangle", .11, .15);
  }
  if (kind === "correct") {
    [523.25, 659.25, 783.99, 1046.5].forEach((note, i) => pluck(note, i * .07, .052, .35));
    chord([659.25, 783.99, 987.77, 1318.51], .36, "triangle", .14, .25);
    noise(.16, .022, .04, 3200, "highpass");
  }
  if (kind === "wrong") {
    sweep(220, 82, .48, .065, 0, "sawtooth");
    tone(110, .44, "triangle", .035, .06, 74);
    noise(.24, .035, .02, 220, "lowpass");
  }
  if (kind === "judge") {
    pluck(349.23, 0, .035, .22);
    pluck(466.16, .18, .032, .22);
    tone(196, .46, "sine", .018, .04);
  }
  if (kind === "daily") {
    noise(.42, .05, 0, 1700, "bandpass");
    sweep(98, 784, .7, .05, 0, "sine");
    [196, 293.66, 392, 587.33, 783.99, 1174.66].forEach((n, i) => pluck(n, i * .08, .048, .32));
  }
  if (kind === "final") {
    noise(.5, .04, 0, 900, "bandpass");
    sweep(73, 294, .85, .052, 0, "sine");
    [196, 261.63, 329.63, 392, 523.25, 659.25, 783.99].forEach((n, i) => pluck(n, .1 + i * .105, .046, .44));
  }
  if (kind === "intro") {
    noise(.34, .03, 0, 2300, "highpass");
    [196, 246.94, 329.63, 392, 523.25].forEach((n, i) => pluck(n, .08 + i * .09, .038, .42));
  }
  if (kind === "reset") {
    tone(180, .12, "sine", .045);
    tone(120, .16, "sine", .04, .09);
  }
}

function stopMusic() {
  clearTimeout(audio.musicTimer);
  audio.musicTimer = null;
}

function scheduleMusicPhrase(first) {
  if (!audio.musicOn) return;
  const motifs = [
    [392, 523.25, 659.25, null, 587.33, 493.88, 440, null],
    [329.63, 392, null, 523.25, 587.33, 523.25, 440, null],
    [392, null, 493.88, 587.33, 659.25, null, 523.25, 392],
    [293.66, 369.99, 440, null, 523.25, 493.88, 392, null]
  ];
  const motif = motifs[audio.step % motifs.length];
  const startDelay = first ? .72 : .22;
  motif.forEach((note, i) => {
    if (!note) return;
    const delay = startDelay + i * .42;
    pluck(note, delay, .024, .5);
    tone(note * 2, .16, "sine", .006, delay + .012);
  });
  const root = [98, 110, 130.81, 146.83][audio.step % 4];
  tone(root, .9, "sine", .017, startDelay + .05);
  tone(root * 1.5, .72, "triangle", .011, startDelay + 1.72);
  audio.step += 1;
  const pause = audio.step % 2 ? 2800 : 4300;
  audio.musicTimer = setTimeout(() => scheduleMusicPhrase(false), startDelay * 1000 + motif.length * 420 + pause);
}

function toggleMusic() {
  ensureAudio();
  if (!audio.ctx) return;
  if (audio.ctx.state === "suspended") audio.ctx.resume();
  audio.musicOn = !audio.musicOn;
  document.body.classList.toggle("music-on", audio.musicOn);
  document.getElementById("musicBtn").textContent = audio.musicOn ? "Sound Off" : "Sound On";
  if (audio.musicOn) {
    stopMusic();
    audio.step = 0;
    playSfx("intro");
    scheduleMusicPhrase(true);
  } else {
    stopMusic();
  }
}

function initStageMotion() {
  if (document.documentElement.classList.contains("perf-lite") || window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  const root = document.documentElement;
  let tx = 0;
  let ty = 0;
  let cx = 0;
  let cy = 0;
  window.addEventListener("pointermove", (event) => {
    if (window.innerWidth < 760) return;
    tx = (event.clientX / window.innerWidth) - .5;
    ty = (event.clientY / window.innerHeight) - .5;
    root.style.setProperty("--spot-x", Math.round(event.clientX / window.innerWidth * 100) + "%");
    root.style.setProperty("--spot-y", Math.round(event.clientY / window.innerHeight * 100) + "%");
  }, { passive: true });
  function tick() {
    cx += (tx - cx) * .08;
    cy += (ty - cy) * .08;
    root.style.setProperty("--tilt-x", (cx * 2.4).toFixed(3) + "deg");
    root.style.setProperty("--tilt-y", (cy * -1.2).toFixed(3) + "deg");
    root.style.setProperty("--scene-x", (cx * -18).toFixed(2) + "px");
    root.style.setProperty("--scene-y", (cy * -10).toFixed(2) + "px");
    requestAnimationFrame(tick);
  }
  tick();
}

function initCanvas() {
  if (document.documentElement.classList.contains("perf-lite") || window.matchMedia("(prefers-reduced-motion: reduce)").matches || window.innerWidth < 900) {
    const canvas = document.getElementById("space");
    if (canvas) canvas.style.display = "none";
    return;
  }
  const canvas = document.getElementById("space");
  const ctx = canvas.getContext("2d");
  let particles = [];
  let frameSkip = false;
  function resize() {
    const scale = Math.min(devicePixelRatio || 1, 1.25);
    canvas.width = Math.floor(window.innerWidth * scale);
    canvas.height = Math.floor(window.innerHeight * scale);
    particles = Array.from({ length: Math.min(55, Math.floor(window.innerWidth / 28)) }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      z: .25 + Math.random() * 1.4,
      r: .5 + Math.random() * 2.5,
      hue: Math.random()
    }));
  }
  function draw() {
    frameSkip = !frameSkip;
    if (frameSkip) {
      requestAnimationFrame(draw);
      return;
    }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const raw = performance.now();
    const t = raw * .00018;
    const dpr = Math.min(devicePixelRatio || 1, 1.25);
    const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
    grad.addColorStop(0, "rgba(255,255,255,.04)");
    grad.addColorStop(.5, "rgba(0,212,255,.05)");
    grad.addColorStop(1, "rgba(255,95,101,.05)");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.globalCompositeOperation = "screen";
    const beamAlpha = .07 + Math.sin(raw * .0012) * .025;
    for (let b = 0; b < 3; b++) {
      const anchor = canvas.width * (.12 + b * .19);
      const sweep = Math.sin(raw * .00045 + b) * canvas.width * .08;
      const beam = ctx.createLinearGradient(anchor, 0, canvas.width / 2 + sweep, canvas.height);
      beam.addColorStop(0, "rgba(255,209,102," + beamAlpha + ")");
      beam.addColorStop(.45, "rgba(0,212,255," + (beamAlpha * .45) + ")");
      beam.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = beam;
      ctx.beginPath();
      ctx.moveTo(anchor - canvas.width * .025, 0);
      ctx.lineTo(anchor + canvas.width * .025, 0);
      ctx.lineTo(canvas.width / 2 + sweep + canvas.width * .18, canvas.height);
      ctx.lineTo(canvas.width / 2 + sweep - canvas.width * .18, canvas.height);
      ctx.closePath();
      ctx.fill();
    }
    const horizon = canvas.height * .68;
    ctx.strokeStyle = "rgba(0,212,255,.13)";
    ctx.lineWidth = dpr;
    for (let i = 0; i < 9; i++) {
      const y = horizon + Math.pow(i / 8, 1.75) * canvas.height * .33;
      ctx.beginPath();
      ctx.moveTo(canvas.width * .08, y);
      ctx.lineTo(canvas.width * .92, y);
      ctx.stroke();
    }
    for (let i = -5; i <= 5; i++) {
      const x = canvas.width / 2 + i * canvas.width * .09;
      ctx.beginPath();
      ctx.moveTo(canvas.width / 2, horizon);
      ctx.lineTo(x, canvas.height);
      ctx.stroke();
    }
    ctx.globalAlpha = .55 + Math.sin(raw * .002) * .18;
    ctx.strokeStyle = "rgba(255,209,102,.18)";
    ctx.beginPath();
    ctx.arc(canvas.width * .5, canvas.height * .49, canvas.width * .24, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
    particles.forEach((p, i) => {
      p.y += p.z * dpr * .6;
      p.x += Math.sin(t * 8 + i) * .16 * dpr;
      if (p.y > canvas.height + 20) {
        p.y = -20;
        p.x = Math.random() * canvas.width;
      }
      ctx.beginPath();
      ctx.fillStyle = p.hue > .66 ? "rgba(255,209,102,.85)" : p.hue > .33 ? "rgba(46,196,182,.72)" : "rgba(255,95,101,.66)";
      ctx.arc(p.x, p.y, p.r * dpr, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    for (let i = 0; i < 3; i++) {
      const y = canvas.height * (.16 + i * .16) + Math.sin(raw * .001 + i) * 18 * dpr;
      const x0 = (Math.sin(raw * .0006 + i * 1.7) * .5 + .5) * canvas.width;
      const len = canvas.width * (.12 + (i % 3) * .035);
      const electric = i % 2 ? "rgba(0,212,255,.16)" : "rgba(255,209,102,.14)";
      ctx.strokeStyle = electric;
      ctx.lineWidth = (1.2 + (i % 3)) * dpr;
      ctx.beginPath();
      ctx.moveTo(x0 - len, y);
      ctx.lineTo(x0 + len, y + Math.sin(i + raw * .002) * 10 * dpr);
      ctx.stroke();
    }
    ctx.restore();
    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.rotate(t);
    for (let ring = 0; ring < 4; ring++) {
      ctx.beginPath();
      ctx.strokeStyle = ring % 2 ? "rgba(255,209,102,.12)" : "rgba(0,212,255,.12)";
      ctx.lineWidth = (1 + ring) * dpr;
      ctx.ellipse(0, 0, (220 + ring * 90) * dpr, (70 + ring * 30) * dpr, ring * .4, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();
    requestAnimationFrame(draw);
  }
  resize();
  window.addEventListener("resize", resize);
  draw();
}

document.getElementById("closeModal").addEventListener("click", closeModal);
document.getElementById("modal").addEventListener("click", (event) => {
  if (event.target.id === "modal") closeModal();
});
document.addEventListener("keydown", (event) => {
  if (event.key === "Escape") closeModal();
});
document.getElementById("addTeamBtn").addEventListener("click", addTeam);
document.getElementById("soloBtn").addEventListener("click", toggleSoloMode);
document.getElementById("resetBtn").addEventListener("click", resetGame);
document.getElementById("finalBtn").addEventListener("click", openFinal);
document.getElementById("musicBtn").addEventListener("click", toggleMusic);

initStageMotion();
initCanvas();
renderAll();
setTimeout(() => document.body.classList.add("game-booted"), 1600);
</script>
