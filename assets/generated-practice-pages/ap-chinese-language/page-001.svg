  <text x="92" y="286" class="section">COURSE OVERVIEW - PAGE 1</text>
<text x="92" y="316" class="blank"> </text>
<text x="92" y="346" class="body">Course: AP Chinese Language and Culture</text>
<text x="92" y="376" class="body">Framework: College Board AP Course and Exam Description</text>
<text x="92" y="406" class="body">Official source family: College Board AP Courses and Exams</text>
<text x="92" y="436" class="body">Use this page like the front page of a practice form: check course,</text>
<text x="92" y="466" class="body">unit, and source authority before answering.</text>
<text x="92" y="496" class="blank"> </text>
