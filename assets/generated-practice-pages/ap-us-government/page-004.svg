<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="1500" viewBox="0 0 1120 1500" role="img" aria-label="Rubric and Unit Coverage">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf4"/>
      <stop offset=".55" stop-color="#f4f0df"/>
      <stop offset="1" stop-color="#e7dfc4"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff7bcc"/>
      <stop offset="1" stop-color="#7af0ff"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#000" flood-opacity=".25"/>
    </filter>
  </defs>
  <rect width="1120" height="1500" fill="#15100b"/>
  <rect x="46" y="42" width="1028" height="1416" rx="22" fill="url(#paper)" filter="url(#shadow)"/>
  <rect x="46" y="42" width="1028" height="18" rx="9" fill="url(#bar)"/>
  <rect x="92" y="106" width="936" height="112" rx="14" fill="#12182b"/>
  <text x="126" y="154" font-family="Arial Black, Impact, sans-serif" font-size="34" fill="#fff7d7">AP United States Government and Politics</text>
  <text x="126" y="194" font-family="Arial, sans-serif" font-size="20" fill="#cfe8ff">Rubric and Unit Coverage</text>
  <text x="864" y="180" font-family="Arial Black, Impact, sans-serif" font-size="44" text-anchor="middle" fill="#ff7bcc">P4</text>
  <rect x="92" y="246" width="936" height="900" rx="14" fill="#fffaf0" stroke="#d0c5a6" stroke-width="2"/>
  <text x="92" y="286" class="section">RUBRIC PAGE - PAGE 4</text>
<text x="92" y="316" class="blank"> </text>
<text x="92" y="346" class="body">Units covered: Foundations of American Democracy; Interactions Among</text>
<text x="92" y="376" class="body">Branches of Government; Civil Liberties and Civil Rights; American</text>
<text x="92" y="406" class="body">Political Ideologies and Beliefs; Political Participation</text>
<text x="92" y="436" class="body">Multiple choice: answer from evidence, not just familiar wording.</text>
<text x="92" y="466" class="body">Written response: claim, evidence, reasoning, and course vocabulary.</text>
<text x="92" y="496" class="body">Teacher note: exact released Regents/AP forms stay in the dedicated</text>
<text x="92" y="526" class="body">official practice runners when digitized.</text>
<text x="92" y="556" class="blank"> </text>
<text x="92" y="586" class="section">COURSE UNIT MAP</text>
<text x="92" y="616" class="body">1. Foundations of American Democracy</text>
<text x="92" y="646" class="body">2. Interactions Among Branches of Government</text>
<text x="92" y="676" class="body">3. Civil Liberties and Civil Rights</text>
<text x="92" y="706" class="body">4. American Political Ideologies and Beliefs</text>
<text x="92" y="736" class="body">5. Political Participation</text>
  <rect x="92" y="1190" width="936" height="156" rx="14" fill="#141a2d"/>
  <text x="122" y="1234" font-family="Arial Black, Impact, sans-serif" font-size="25" fill="#7af0ff">VIEWER CONTRACT</text>
  <text x="122" y="1274" font-family="Arial, sans-serif" font-size="21" fill="#f8fbff">Zoomable practice page. Use Expand Source, +/- zoom, fit, keyboard shortcuts, and page strip.</text>
  <text x="122" y="1314" font-family="Arial, sans-serif" font-size="20" fill="#d7e4ff">Teacher review and scoring guide</text>
  <text x="92" y="1408" font-family="Arial, sans-serif" font-size="18" fill="#70684f">Generated from NYS/AP course taxonomy for classroom practice. Exact public released forms remain in Regents/AP practice runners when registered.</text>
  <style>
    .section { font: 700 23px Arial, sans-serif; fill: #13192b; }
    .body { font: 21px Arial, sans-serif; fill: #21242d; }
    .blank { font: 10px Arial, sans-serif; fill: transparent; }
  </style>
</svg>
