<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="1500" viewBox="0 0 1120 1500" role="img" aria-label="Multiple-Choice Stimulus Set">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf4"/>
      <stop offset=".55" stop-color="#f4f0df"/>
      <stop offset="1" stop-color="#e7dfc4"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#72e9ff"/>
      <stop offset="1" stop-color="#ffd15c"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#000" flood-opacity=".25"/>
    </filter>
  </defs>
  <rect width="1120" height="1500" fill="#15100b"/>
  <rect x="46" y="42" width="1028" height="1416" rx="22" fill="url(#paper)" filter="url(#shadow)"/>
  <rect x="46" y="42" width="1028" height="18" rx="9" fill="url(#bar)"/>
  <rect x="92" y="106" width="936" height="112" rx="14" fill="#12182b"/>
  <text x="126" y="154" font-family="Arial Black, Impact, sans-serif" font-size="34" fill="#fff7d7">World Languages Checkpoint C</text>
  <text x="126" y="194" font-family="Arial, sans-serif" font-size="20" fill="#cfe8ff">Multiple-Choice Stimulus Set</text>
  <text x="864" y="180" font-family="Arial Black, Impact, sans-serif" font-size="44" text-anchor="middle" fill="#72e9ff">P2</text>
  <rect x="92" y="246" width="936" height="900" rx="14" fill="#fffaf0" stroke="#d0c5a6" stroke-width="2"/>
  <text x="92" y="286" class="section">MCQ SOURCE PAGE - PAGE 2</text>
<text x="92" y="316" class="blank"> </text>
<text x="92" y="346" class="body">Stimulus A: conversation, question, response</text>
<text x="92" y="376" class="body">Stimulus B: main idea, detail, context clue</text>
<text x="92" y="406" class="body">Skill focus: read the source, graph, example, or scenario before</text>
<text x="92" y="436" class="body">choosing an answer.</text>
<text x="92" y="466" class="body">Question bank items should cite this packet when the task requires</text>
<text x="92" y="496" class="body">evidence from a source.</text>
<text x="92" y="526" class="blank"> </text>
<text x="92" y="556" class="section">COURSE UNIT MAP</text>
<text x="92" y="586" class="body">1. Interpersonal Communication</text>
<text x="92" y="616" class="body">2. Interpretive Listening and Reading</text>
<text x="92" y="646" class="body">3. Presentational Speaking and Writing</text>
<text x="92" y="676" class="body">4. Culture</text>
<text x="92" y="706" class="body">5. Vocabulary in Context</text>
<text x="92" y="736" class="body">6. Grammar for Meaning</text>
<text x="92" y="766" class="body">7. Community Connections</text>
<text x="92" y="796" class="body">8. Checkpoint Strategy</text>
  <rect x="92" y="1190" width="936" height="156" rx="14" fill="#141a2d"/>
  <text x="122" y="1234" font-family="Arial Black, Impact, sans-serif" font-size="25" fill="#ffd15c">VIEWER CONTRACT</text>
  <text x="122" y="1274" font-family="Arial, sans-serif" font-size="21" fill="#f8fbff">Zoomable practice page. Use Expand Source, +/- zoom, fit, keyboard shortcuts, and page strip.</text>
  <text x="122" y="1314" font-family="Arial, sans-serif" font-size="20" fill="#d7e4ff">Released-form style stimulus page</text>
  <text x="92" y="1408" font-family="Arial, sans-serif" font-size="18" fill="#70684f">Generated from NYS/AP course taxonomy for classroom practice. Exact public released forms remain in Regents/AP practice runners when registered.</text>
  <style>
    .section { font: 700 23px Arial, sans-serif; fill: #13192b; }
    .body { font: 21px Arial, sans-serif; fill: #21242d; }
    .blank { font: 10px Arial, sans-serif; fill: transparent; }
  </style>
</svg>
