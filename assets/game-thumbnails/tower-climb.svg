<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
<!-- Mr. Mac's Arcade thumbnail · Tower Climb · 400×250 editorial dark -->
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#10141d"/>
    <stop offset="1" stop-color="#0a0d14"/>
  </linearGradient>
  <linearGradient id="girder" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#ff8e6f"/>
    <stop offset="1" stop-color="#a04432"/>
  </linearGradient>
  <linearGradient id="rivet" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#ffd0aa"/>
    <stop offset="1" stop-color="#e85f4d"/>
  </linearGradient>
</defs>
<rect width="400" height="250" fill="url(#bg)"/>
<!-- 4 angled girders (slight slope), staircase pattern -->
<g stroke="#0a0d14" stroke-width="1">
  <!-- bottom girder slope down-right -->
  <polygon points="60,210 350,224 350,232 60,218" fill="url(#girder)"/>
  <!-- girder 2 slope down-left -->
  <polygon points="60,180 350,166 350,174 60,188" fill="url(#girder)"/>
  <!-- girder 3 slope down-right -->
  <polygon points="60,140 350,154 350,162 60,148" fill="url(#girder)"/>
  <!-- girder 4 (top) slope down-left -->
  <polygon points="100,100 320,86 320,94 100,108" fill="url(#girder)"/>
</g>
<!-- rivets (decoration) -->
<g fill="url(#rivet)">
  <circle cx="80" cy="220" r="1.5"/>
  <circle cx="160" cy="222" r="1.5"/>
  <circle cx="240" cy="223" r="1.5"/>
  <circle cx="320" cy="225" r="1.5"/>
  <circle cx="80" cy="184" r="1.5"/>
  <circle cx="160" cy="180" r="1.5"/>
  <circle cx="240" cy="174" r="1.5"/>
  <circle cx="320" cy="170" r="1.5"/>
  <circle cx="80" cy="146" r="1.5"/>
  <circle cx="160" cy="148" r="1.5"/>
  <circle cx="240" cy="156" r="1.5"/>
  <circle cx="320" cy="158" r="1.5"/>
</g>
<!-- ladders -->
<g stroke="#f5c451" stroke-width="1.5" fill="none">
  <!-- ladder 1 (right side, between bottom and girder2) -->
  <line x1="320" y1="220" x2="320" y2="172"/>
  <line x1="332" y1="220" x2="332" y2="172"/>
  <line x1="320" y1="210" x2="332" y2="210"/>
  <line x1="320" y1="195" x2="332" y2="195"/>
  <line x1="320" y1="180" x2="332" y2="180"/>
  <!-- ladder 2 (left side) -->
  <line x1="60" y1="184" x2="60" y2="146"/>
  <line x1="72" y1="184" x2="72" y2="146"/>
  <line x1="60" y1="172" x2="72" y2="172"/>
  <line x1="60" y1="158" x2="72" y2="158"/>
  <!-- ladder 3 (right) -->
  <line x1="290" y1="146" x2="290" y2="100"/>
  <line x1="302" y1="146" x2="302" y2="100"/>
  <line x1="290" y1="135" x2="302" y2="135"/>
  <line x1="290" y1="120" x2="302" y2="120"/>
  <line x1="290" y1="106" x2="302" y2="106"/>
</g>
<!-- climbing figure on a girder -->
<g transform="translate(160,135)">
  <circle cx="0" cy="-7" r="5" fill="#7af0ff"/>
  <rect x="-4" y="-2" width="8" height="9" fill="#a78bfa"/>
  <line x1="-4" y1="2" x2="-9" y2="-2" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="4" y1="2" x2="10" y2="0" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="-2" y1="7" x2="-5" y2="13" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="2" y1="7" x2="6" y2="13" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
</g>
<!-- rolling barrel on top girder -->
<g transform="translate(220,75)">
  <circle cx="0" cy="0" r="8" fill="#e85f4d" stroke="#0a0d14" stroke-width="0.8"/>
  <line x1="-6" y1="-3" x2="6" y2="-3" stroke="#0a0d14" stroke-width="0.6"/>
  <line x1="-6" y1="3" x2="6" y2="3" stroke="#0a0d14" stroke-width="0.6"/>
  <line x1="-7" y1="0" x2="7" y2="0" stroke="#0a0d14" stroke-width="0.6"/>
</g>
<!-- princess up top -->
<g transform="translate(180,75)">
  <circle cx="0" cy="0" r="5" fill="#ff7cc8"/>
  <polygon points="-5,3 5,3 6,12 -6,12" fill="#ff7cc8"/>
  <text x="0" y="-7" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="10" fill="#f5c451">!</text>
</g>
<!-- scanlines -->
<g opacity="0.06" stroke="white" stroke-width="0.5">
  <line x1="0" y1="0" x2="400" y2="0"/><line x1="0" y1="3" x2="400" y2="3"/><line x1="0" y1="6" x2="400" y2="6"/><line x1="0" y1="9" x2="400" y2="9"/><line x1="0" y1="12" x2="400" y2="12"/><line x1="0" y1="15" x2="400" y2="15"/><line x1="0" y1="18" x2="400" y2="18"/><line x1="0" y1="21" x2="400" y2="21"/><line x1="0" y1="24" x2="400" y2="24"/><line x1="0" y1="27" x2="400" y2="27"/><line x1="0" y1="30" x2="400" y2="30"/><line x1="0" y1="33" x2="400" y2="33"/><line x1="0" y1="36" x2="400" y2="36"/><line x1="0" y1="39" x2="400" y2="39"/><line x1="0" y1="42" x2="400" y2="42"/><line x1="0" y1="45" x2="400" y2="45"/><line x1="0" y1="48" x2="400" y2="48"/><line x1="0" y1="51" x2="400" y2="51"/><line x1="0" y1="54" x2="400" y2="54"/><line x1="0" y1="57" x2="400" y2="57"/><line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="63" x2="400" y2="63"/><line x1="0" y1="66" x2="400" y2="66"/><line x1="0" y1="69" x2="400" y2="69"/><line x1="0" y1="72" x2="400" y2="72"/><line x1="0" y1="75" x2="400" y2="75"/><line x1="0" y1="78" x2="400" y2="78"/><line x1="0" y1="81" x2="400" y2="81"/><line x1="0" y1="84" x2="400" y2="84"/><line x1="0" y1="87" x2="400" y2="87"/><line x1="0" y1="90" x2="400" y2="90"/><line x1="0" y1="93" x2="400" y2="93"/><line x1="0" y1="96" x2="400" y2="96"/><line x1="0" y1="99" x2="400" y2="99"/><line x1="0" y1="102" x2="400" y2="102"/><line x1="0" y1="105" x2="400" y2="105"/><line x1="0" y1="108" x2="400" y2="108"/><line x1="0" y1="111" x2="400" y2="111"/><line x1="0" y1="114" x2="400" y2="114"/><line x1="0" y1="117" x2="400" y2="117"/><line x1="0" y1="120" x2="400" y2="120"/><line x1="0" y1="123" x2="400" y2="123"/><line x1="0" y1="126" x2="400" y2="126"/><line x1="0" y1="129" x2="400" y2="129"/><line x1="0" y1="132" x2="400" y2="132"/><line x1="0" y1="135" x2="400" y2="135"/><line x1="0" y1="138" x2="400" y2="138"/><line x1="0" y1="141" x2="400" y2="141"/><line x1="0" y1="144" x2="400" y2="144"/><line x1="0" y1="147" x2="400" y2="147"/><line x1="0" y1="150" x2="400" y2="150"/><line x1="0" y1="153" x2="400" y2="153"/><line x1="0" y1="156" x2="400" y2="156"/><line x1="0" y1="159" x2="400" y2="159"/><line x1="0" y1="162" x2="400" y2="162"/><line x1="0" y1="165" x2="400" y2="165"/><line x1="0" y1="168" x2="400" y2="168"/><line x1="0" y1="171" x2="400" y2="171"/><line x1="0" y1="174" x2="400" y2="174"/><line x1="0" y1="177" x2="400" y2="177"/><line x1="0" y1="180" x2="400" y2="180"/><line x1="0" y1="183" x2="400" y2="183"/><line x1="0" y1="186" x2="400" y2="186"/><line x1="0" y1="189" x2="400" y2="189"/><line x1="0" y1="192" x2="400" y2="192"/><line x1="0" y1="195" x2="400" y2="195"/><line x1="0" y1="198" x2="400" y2="198"/><line x1="0" y1="201" x2="400" y2="201"/><line x1="0" y1="204" x2="400" y2="204"/><line x1="0" y1="207" x2="400" y2="207"/><line x1="0" y1="210" x2="400" y2="210"/><line x1="0" y1="213" x2="400" y2="213"/><line x1="0" y1="216" x2="400" y2="216"/><line x1="0" y1="219" x2="400" y2="219"/><line x1="0" y1="222" x2="400" y2="222"/><line x1="0" y1="225" x2="400" y2="225"/><line x1="0" y1="228" x2="400" y2="228"/><line x1="0" y1="231" x2="400" y2="231"/><line x1="0" y1="234" x2="400" y2="234"/><line x1="0" y1="237" x2="400" y2="237"/><line x1="0" y1="240" x2="400" y2="240"/><line x1="0" y1="243" x2="400" y2="243"/><line x1="0" y1="246" x2="400" y2="246"/><line x1="0" y1="249" x2="400" y2="249"/>
</g>
<!-- title -->
<text x="16" y="28" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="14" font-weight="700" fill="#ffffff" letter-spacing="2" style="text-shadow:0 0 4px #ff8e6f">TOWER CLIMB</text>
<text x="16" y="42" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="8" fill="#ff8e6f" letter-spacing="3" opacity="0.7">GIRDER&#160;ASCENT</text>
<!-- genre tag -->
<text x="384" y="240" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="9" fill="#b8895c" letter-spacing="2">DONKEY KONG</text>
<!-- border -->
<rect x="1" y="1" width="398" height="248" fill="none" stroke="#b8895c" stroke-width="2"/>
</svg>
