<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
<!-- Mr. Mac's Arcade thumbnail · ARCHIVE TYCOON · 400×250 editorial dark -->
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#10141d"/>
    <stop offset="1" stop-color="#0a0d14"/>
  </linearGradient>
</defs>
<rect width="400" height="250" fill="url(#bg)"/>
<!-- big click button center -->
<g transform="translate(200,140)">
  <circle r="58" fill="#10141d" stroke="#f5c451" stroke-width="0.8" opacity="0.5"/>
  <circle r="48" fill="#f5c451" opacity="0.92"/>
  <circle r="48" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.8"/>
  <circle r="40" fill="none" stroke="#0a0d14" stroke-width="0.6" opacity="0.45"/>
  <text y="-2" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" font-weight="700" fill="#0a0d14" letter-spacing="2">CLICK</text>
  <text y="14" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#0a0d14" opacity="0.75">+1 KNOWLEDGE</text>
</g>
<!-- score counter top -->
<g transform="translate(200,68)">
  <rect x="-50" y="-14" width="100" height="22" rx="3" fill="#10141d" stroke="#f5c451" stroke-width="0.6"/>
  <text y="2" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#f5c451">1,247,300</text>
</g>
<!-- orbiting icons (4 small circles around the button) -->
<!-- apprentice (top-left) -->
<g transform="translate(132,98)">
  <circle r="14" fill="#7af0ff" opacity="0.85" stroke="#ffffff" stroke-width="0.5"/>
  <circle cy="-3" r="3" fill="#0a0d14"/>
  <rect x="-4" y="0" width="8" height="6" fill="#0a0d14"/>
  <text y="22" text-anchor="middle" font-family="monospace" font-size="6" fill="#7af0ff">APPRENTICE</text>
</g>
<!-- scribe (top-right) -->
<g transform="translate(268,98)">
  <circle r="14" fill="#5fd699" opacity="0.85" stroke="#ffffff" stroke-width="0.5"/>
  <rect x="-5" y="-5" width="10" height="8" fill="#0a0d14"/>
  <line x1="-3" y1="-2" x2="3" y2="-2" stroke="#5fd699" stroke-width="0.5"/>
  <line x1="-3" y1="0" x2="3" y2="0" stroke="#5fd699" stroke-width="0.5"/>
  <rect x="-1" y="3" width="2" height="6" fill="#0a0d14"/>
  <text y="22" text-anchor="middle" font-family="monospace" font-size="6" fill="#5fd699">SCRIBE</text>
</g>
<!-- library (bottom-left) -->
<g transform="translate(132,182)">
  <circle r="14" fill="#ff7cc8" opacity="0.85" stroke="#ffffff" stroke-width="0.5"/>
  <rect x="-7" y="-5" width="3" height="10" fill="#0a0d14"/>
  <rect x="-3" y="-5" width="3" height="10" fill="#0a0d14"/>
  <rect x="1" y="-5" width="3" height="10" fill="#0a0d14"/>
  <rect x="5" y="-5" width="3" height="10" fill="#0a0d14"/>
  <text y="22" text-anchor="middle" font-family="monospace" font-size="6" fill="#ff7cc8">LIBRARY</text>
</g>
<!-- university (bottom-right) -->
<g transform="translate(268,182)">
  <circle r="14" fill="#b892ff" opacity="0.85" stroke="#ffffff" stroke-width="0.5"/>
  <polygon points="-8,2 0,-6 8,2" fill="#0a0d14"/>
  <rect x="-7" y="2" width="14" height="6" fill="#0a0d14"/>
  <text y="22" text-anchor="middle" font-family="monospace" font-size="6" fill="#b892ff">SCHOLAR</text>
</g>
<!-- orbit ring -->
<circle cx="200" cy="140" r="78" fill="none" stroke="#b8895c" stroke-width="0.4" stroke-dasharray="2,3" opacity="0.45"/>

