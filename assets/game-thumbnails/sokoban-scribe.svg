<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
<!-- Mr. Mac's Arcade thumbnail · Sokoban Scribe · 400×250 editorial dark -->
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#10141d"/>
    <stop offset="1" stop-color="#0a0d14"/>
  </linearGradient>
  <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#5a3a22"/>
    <stop offset="1" stop-color="#3a2410"/>
  </linearGradient>
  <linearGradient id="scrollG" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#ffe9a0"/>
    <stop offset="1" stop-color="#f5c451"/>
  </linearGradient>
</defs>
<rect width="400" height="250" fill="url(#bg)"/>
<!-- floor grid 8x5 starting (88,75), cell=28 -->
<g stroke="#3a2a18" stroke-width="0.5" fill="#1a1410">
  <rect x="88" y="75" width="224" height="140"/>
</g>
<g stroke="#3a2a18" stroke-width="0.4" opacity="0.6">
  <line x1="116" y1="75" x2="116" y2="215"/>
  <line x1="144" y1="75" x2="144" y2="215"/>
  <line x1="172" y1="75" x2="172" y2="215"/>
  <line x1="200" y1="75" x2="200" y2="215"/>
  <line x1="228" y1="75" x2="228" y2="215"/>
  <line x1="256" y1="75" x2="256" y2="215"/>
  <line x1="284" y1="75" x2="284" y2="215"/>
  <line x1="88" y1="103" x2="312" y2="103"/>
  <line x1="88" y1="131" x2="312" y2="131"/>
  <line x1="88" y1="159" x2="312" y2="159"/>
  <line x1="88" y1="187" x2="312" y2="187"/>
</g>
<!-- walls (around perimeter and a few inner) -->
<g fill="url(#wall)" stroke="#0a0d14" stroke-width="0.5">
  <!-- top row walls -->
  <rect x="88" y="75" width="28" height="28"/>
  <rect x="116" y="75" width="28" height="28"/>
  <rect x="284" y="75" width="28" height="28"/>
  <!-- bottom row walls -->
  <rect x="88" y="187" width="28" height="28"/>
  <rect x="284" y="187" width="28" height="28"/>
  <!-- left col -->
  <rect x="88" y="103" width="28" height="28"/>
  <rect x="88" y="131" width="28" height="28"/>
  <rect x="88" y="159" width="28" height="28"/>
  <!-- right col -->
  <rect x="284" y="103" width="28" height="28"/>
  <rect x="284" y="131" width="28" height="28"/>
  <rect x="284" y="159" width="28" height="28"/>
  <!-- inner pillar -->
  <rect x="172" y="103" width="28" height="28"/>
  <rect x="228" y="159" width="28" height="28"/>
</g>
<!-- goal shelf marker -->
<rect x="232" y="107" width="20" height="20" fill="none" stroke="#5fd699" stroke-width="1.5" stroke-dasharray="2,2"/>
<circle cx="242" cy="117" r="3" fill="#5fd699" opacity="0.6"/>
<!-- box (scroll) being pushed -->
<g transform="translate(176,135)">
  <rect x="0" y="0" width="20" height="20" rx="2" fill="url(#scrollG)" stroke="#0a0d14" stroke-width="0.8"/>
  <line x1="3" y1="6" x2="17" y2="6" stroke="#8a5d3a" stroke-width="0.7"/>
  <line x1="3" y1="11" x2="17" y2="11" stroke="#8a5d3a" stroke-width="0.7"/>
  <line x1="3" y1="16" x2="13" y2="16" stroke="#8a5d3a" stroke-width="0.7"/>
</g>
<!-- player (scribe) -->
<g transform="translate(150,145)">
  <circle cx="0" cy="-2" r="6" fill="#7af0ff" stroke="#0a0d14" stroke-width="0.8"/>
  <rect x="-5" y="2" width="10" height="10" rx="1" fill="#a78bfa"/>
  <rect x="-2" y="-3" width="4" height="2" fill="#0a0d14"/>
</g>
<!-- arrow showing push direction -->
<g transform="translate(165,145)" opacity="0.7" stroke="#7af0ff" stroke-width="1.2" fill="none">
  <line x1="0" y1="0" x2="9" y2="0"/>
  <polyline points="6,-3 9,0 6,3"/>
</g>
<!-- placed scroll in another goal (lit) -->
<g transform="translate(232,191)">
  <rect x="0" y="0" width="20" height="20" rx="2" fill="url(#scrollG)" stroke="#5fd699" stroke-width="1.2"/>
  <line x1="3" y1="6" x2="17" y2="6" stroke="#8a5d3a" stroke-width="0.7"/>
  <line x1="3" y1="11" x2="17" y2="11" stroke="#8a5d3a" stroke-width="0.7"/>
  <line x1="3" y1="16" x2="13" y2="16" stroke="#8a5d3a" stroke-width="0.7"/>
</g>
<!-- scanlines -->
<g opacity="0.06" stroke="white" stroke-width="0.5">
