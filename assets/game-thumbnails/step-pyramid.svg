<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
<!-- Mr. Mac's Arcade thumbnail · Step Pyramid · 400×250 editorial dark -->
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#10141d"/>
    <stop offset="1" stop-color="#0a0d14"/>
  </linearGradient>
  <linearGradient id="topF" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#ffe9a0"/>
    <stop offset="1" stop-color="#f5c451"/>
  </linearGradient>
  <linearGradient id="leftF" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#a06a3a"/>
    <stop offset="1" stop-color="#c98a52"/>
  </linearGradient>
  <linearGradient id="rightF" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#7a4a22"/>
    <stop offset="1" stop-color="#5a3414"/>
  </linearGradient>
</defs>
<rect width="400" height="250" fill="url(#bg)"/>
<!-- isometric pyramid with cubes; each cube ~32 wide, 16 tall top -->
<!-- helper: draw cube at (cx, cy) where cy is top diamond center -->
<!-- row 4 (bottom, 7 cubes wide) -->
<g>
  <!-- cube (cx,cy) tops -->
  <!-- row 4 z=0: positions x = 96,128,160,192,224,256,288 ; cy = 200 -->
  <!-- but stacking: bottom row will be drawn first -->
</g>
<!-- BOTTOM ROW: 4 cubes in a horizontal isometric arrangement -->
<!-- We'll draw 10 cubes total: 4-3-2-1 stack -->
<!-- Cube w=32, h=16 (top), depth=24 -->
<!-- We'll position centers along screen -->
<!-- Row of 4 (bottom) -->
<g>
  <!-- Cube 1 center 124,210 -->
  <polygon points="124,194 156,210 124,226 92,210" fill="url(#topF)" stroke="#0a0d14" stroke-width="0.8"/>
  <polygon points="92,210 124,226 124,250 92,234" fill="url(#leftF)" stroke="#0a0d14" stroke-width="0.8"/>
  <polygon points="156,210 124,226 124,250 156,234" fill="url(#rightF)" stroke="#0a0d14" stroke-width="0.8"/>
  <!-- Cube 2 center 188,210 -->
  <polygon points="188,194 220,210 188,226 156,210" fill="url(#topF)" stroke="#0a0d14" stroke-width="0.8"/>
  <polygon points="156,210 188,226 188,250 156,234" fill="url(#leftF)" stroke="#0a0d14" stroke-width="0.8"/>
  <polygon points="220,210 188,226 188,250 220,234" fill="url(#rightF)" stroke="#0a0d14" stroke-width="0.8"/>
  <!-- Cube 3 center 252,210 -->
  <polygon points="252,194 284,210 252,226 220,210" fill="url(#topF)" stroke="#0a0d14" stroke-width="0.8"/>
  <polygon points="220,210 252,226 252,250 220,234" fill="url(#leftF)" stroke="#0a0d14" stroke-width="0.8"/>
  <polygon points="284,210 252,226 252,250 284,234" fill="url(#rightF)" stroke="#0a0d14" stroke-width="0.8"/>
</g>
<!-- Row of 3 (above; offset back into screen, smaller arrangement) -->
<g>
  <!-- Cube 4 center 156,178 -->
  <polygon points="156,162 188,178 156,194 124,178" fill="url(#topF)" stroke="#0a0d14" stroke-width="0.8"/>
  <polygon points="124,178 156,194 156,218 124,202" fill="url(#leftF)" stroke="#0a0d14" stroke-width="0.8"/>
  <polygon points="188,178 156,194 156,218 188,202" fill="url(#rightF)" stroke="#0a0d14" stroke-width="0.8"/>
  <!-- Cube 5 center 220,178 -->
  <polygon points="220,162 252,178 220,194 188,178" fill="url(#topF)" stroke="#0a0d14" stroke-width="0.8"/>
  <polygon points="188,178 220,194 220,218 188,202" fill="url(#leftF)" stroke="#0a0d14" stroke-width="0.8"/>
  <polygon points="252,178 220,194 220,218 252,202" fill="url(#rightF)" stroke="#0a0d14" stroke-width="0.8"/>
</g>
<!-- Row of 2 -->
<g>
  <!-- Cube 6 center 188,146 -->
  <polygon points="188,130 220,146 188,162 156,146" fill="url(#topF)" stroke="#0a0d14" stroke-width="0.8"/>
  <polygon points="156,146 188,162 188,186 156,170" fill="url(#leftF)" stroke="#0a0d14" stroke-width="0.8"/>
  <polygon points="220,146 188,162 188,186 220,170" fill="url(#rightF)" stroke="#0a0d14" stroke-width="0.8"/>
</g>
<!-- Top cube (lit gold) -->
<g>
  <polygon points="220,98 252,114 220,130 188,114" fill="url(#topF)" stroke="#f5c451" stroke-width="1.2"/>
  <polygon points="188,114 220,130 220,154 188,138" fill="url(#leftF)" stroke="#0a0d14" stroke-width="0.8"/>
  <polygon points="252,114 220,130 220,154 252,138" fill="url(#rightF)" stroke="#0a0d14" stroke-width="0.8"/>
</g>
<!-- Q*bert character on top -->
<g transform="translate(220,90)">
  <circle cx="0" cy="0" r="6" fill="#ff8e6f" stroke="#0a0d14" stroke-width="0.8"/>
  <ellipse cx="-2" cy="-1" rx="1.4" ry="2" fill="white"/>
  <ellipse cx="2" cy="-1" rx="1.4" ry="2" fill="white"/>
  <circle cx="-2" cy="-1" r="0.7" fill="#0a0d14"/>
  <circle cx="2" cy="-1" r="0.7" fill="#0a0d14"/>
  <path d="M -3 4 Q 0 8 3 4" stroke="#0a0d14" stroke-width="1" fill="none"/>
</g>
<!-- scanlines -->
<g opacity="0.06" stroke="white" stroke-width="0.5">
