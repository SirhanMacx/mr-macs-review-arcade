<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
<!-- Mr. Mac's Arcade thumbnail · Rumor Whack · 400×250 editorial dark -->
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#10141d"/>
    <stop offset="1" stop-color="#0a0d14"/>
  </linearGradient>
  <linearGradient id="desk" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#3a2410"/>
    <stop offset="1" stop-color="#1c1208"/>
  </linearGradient>
  <linearGradient id="podium" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#5a3a22"/>
    <stop offset="1" stop-color="#3a2410"/>
  </linearGradient>
</defs>
<rect width="400" height="250" fill="url(#bg)"/>
<!-- newsroom backdrop -->
<rect x="20" y="55" width="360" height="135" fill="#181828" opacity="0.5"/>
<!-- newsroom signage -->
<rect x="160" y="65" width="80" height="14" rx="2" fill="#e85f4d"/>
<text x="200" y="76" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="9" font-weight="700" fill="white" letter-spacing="1">FACT CHECK</text>
<!-- desk slab -->
<rect x="20" y="190" width="360" height="20" fill="url(#desk)"/>
<rect x="20" y="190" width="360" height="3" fill="#b8895c" opacity="0.5"/>
<!-- 5 podiums (whack-a-mole holes) -->
<g>
  <rect x="50" y="160" width="40" height="30" fill="url(#podium)" stroke="#0a0d14" stroke-width="0.8"/>
  <ellipse cx="70" cy="160" rx="20" ry="6" fill="#0a0d14"/>
  <rect x="120" y="160" width="40" height="30" fill="url(#podium)" stroke="#0a0d14" stroke-width="0.8"/>
  <ellipse cx="140" cy="160" rx="20" ry="6" fill="#0a0d14"/>
  <rect x="190" y="160" width="40" height="30" fill="url(#podium)" stroke="#0a0d14" stroke-width="0.8"/>
  <ellipse cx="210" cy="160" rx="20" ry="6" fill="#0a0d14"/>
  <rect x="260" y="160" width="40" height="30" fill="url(#podium)" stroke="#0a0d14" stroke-width="0.8"/>
  <ellipse cx="280" cy="160" rx="20" ry="6" fill="#0a0d14"/>
  <rect x="330" y="160" width="40" height="30" fill="url(#podium)" stroke="#0a0d14" stroke-width="0.8"/>
  <ellipse cx="350" cy="160" rx="20" ry="6" fill="#0a0d14"/>
</g>
<!-- popped rumors emerging -->
<g>
  <!-- pod 1 (down) - empty -->
  <!-- pod 2 (rumor up - red) -->
  <g transform="translate(140,140)">
    <rect x="-14" y="-12" width="28" height="22" rx="3" fill="#e85f4d" stroke="#0a0d14" stroke-width="0.8"/>
    <text x="0" y="3" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="11" font-weight="700" fill="white">!</text>
  </g>
  <!-- pod 3 (rumor up - red) -->
  <g transform="translate(210,135)">
    <rect x="-14" y="-12" width="28" height="22" rx="3" fill="#e85f4d" stroke="#0a0d14" stroke-width="0.8"/>
    <text x="0" y="3" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="11" font-weight="700" fill="white">?</text>
  </g>
  <!-- pod 4 (cracked - just hit) -->
  <g transform="translate(280,148)">
    <rect x="-14" y="-12" width="28" height="22" rx="3" fill="#5a2a1a" stroke="#f5c451" stroke-width="1"/>
    <line x1="-10" y1="-8" x2="10" y2="6" stroke="#f5c451" stroke-width="1.2"/>
    <line x1="10" y1="-8" x2="-10" y2="6" stroke="#f5c451" stroke-width="1.2"/>
  </g>
</g>
<!-- impact stars -->
<g transform="translate(280,142)" fill="#f5c451">
  <polygon points="0,-22 2,-15 9,-13 3,-9 5,-3 0,-7 -5,-3 -3,-9 -9,-13 -2,-15"/>
</g>
<!-- mallet (hammer) -->
<g transform="translate(290,100) rotate(25)">
  <rect x="-2" y="0" width="4" height="40" fill="#8a5d3a"/>
  <rect x="-14" y="-8" width="28" height="14" fill="#7af0ff" stroke="#0a0d14" stroke-width="1"/>
  <rect x="-14" y="-8" width="28" height="3" fill="#bff8ff" opacity="0.6"/>
</g>
<!-- scanlines -->
<g opacity="0.06" stroke="white" stroke-width="0.5">
  <line x1="0" y1="0" x2="400" y2="0"/><line x1="0" y1="3" x2="400" y2="3"/><line x1="0" y1="6" x2="400" y2="6"/><line x1="0" y1="9" x2="400" y2="9"/><line x1="0" y1="12" x2="400" y2="12"/><line x1="0" y1="15" x2="400" y2="15"/><line x1="0" y1="18" x2="400" y2="18"/><line x1="0" y1="21" x2="400" y2="21"/><line x1="0" y1="24" x2="400" y2="24"/><line x1="0" y1="27" x2="400" y2="27"/><line x1="0" y1="30" x2="400" y2="30"/><line x1="0" y1="33" x2="400" y2="33"/><line x1="0" y1="36" x2="400" y2="36"/><line x1="0" y1="39" x2="400" y2="39"/><line x1="0" y1="42" x2="400" y2="42"/><line x1="0" y1="45" x2="400" y2="45"/><line x1="0" y1="48" x2="400" y2="48"/><line x1="0" y1="51" x2="400" y2="51"/><line x1="0" y1="54" x2="400" y2="54"/><line x1="0" y1="57" x2="400" y2="57"/><line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="63" x2="400" y2="63"/><line x1="0" y1="66" x2="400" y2="66"/><line x1="0" y1="69" x2="400" y2="69"/><line x1="0" y1="72" x2="400" y2="72"/><line x1="0" y1="75" x2="400" y2="75"/><line x1="0" y1="78" x2="400" y2="78"/><line x1="0" y1="81" x2="400" y2="81"/><line x1="0" y1="84" x2="400" y2="84"/><line x1="0" y1="87" x2="400" y2="87"/><line x1="0" y1="90" x2="400" y2="90"/><line x1="0" y1="93" x2="400" y2="93"/><line x1="0" y1="96" x2="400" y2="96"/><line x1="0" y1="99" x2="400" y2="99"/><line x1="0" y1="102" x2="400" y2="102"/><line x1="0" y1="105" x2="400" y2="105"/><line x1="0" y1="108" x2="400" y2="108"/><line x1="0" y1="111" x2="400" y2="111"/><line x1="0" y1="114" x2="400" y2="114"/><line x1="0" y1="117" x2="400" y2="117"/><line x1="0" y1="120" x2="400" y2="120"/><line x1="0" y1="123" x2="400" y2="123"/><line x1="0" y1="126" x2="400" y2="126"/><line x1="0" y1="129" x2="400" y2="129"/><line x1="0" y1="132" x2="400" y2="132"/><line x1="0" y1="135" x2="400" y2="135"/><line x1="0" y1="138" x2="400" y2="138"/><line x1="0" y1="141" x2="400" y2="141"/><line x1="0" y1="144" x2="400" y2="144"/><line x1="0" y1="147" x2="400" y2="147"/><line x1="0" y1="150" x2="400" y2="150"/><line x1="0" y1="153" x2="400" y2="153"/><line x1="0" y1="156" x2="400" y2="156"/><line x1="0" y1="159" x2="400" y2="159"/><line x1="0" y1="162" x2="400" y2="162"/><line x1="0" y1="165" x2="400" y2="165"/><line x1="0" y1="168" x2="400" y2="168"/><line x1="0" y1="171" x2="400" y2="171"/><line x1="0" y1="174" x2="400" y2="174"/><line x1="0" y1="177" x2="400" y2="177"/><line x1="0" y1="180" x2="400" y2="180"/><line x1="0" y1="183" x2="400" y2="183"/><line x1="0" y1="186" x2="400" y2="186"/><line x1="0" y1="189" x2="400" y2="189"/><line x1="0" y1="192" x2="400" y2="192"/><line x1="0" y1="195" x2="400" y2="195"/><line x1="0" y1="198" x2="400" y2="198"/><line x1="0" y1="201" x2="400" y2="201"/><line x1="0" y1="204" x2="400" y2="204"/><line x1="0" y1="207" x2="400" y2="207"/><line x1="0" y1="210" x2="400" y2="210"/><line x1="0" y1="213" x2="400" y2="213"/><line x1="0" y1="216" x2="400" y2="216"/><line x1="0" y1="219" x2="400" y2="219"/><line x1="0" y1="222" x2="400" y2="222"/><line x1="0" y1="225" x2="400" y2="225"/><line x1="0" y1="228" x2="400" y2="228"/><line x1="0" y1="231" x2="400" y2="231"/><line x1="0" y1="234" x2="400" y2="234"/><line x1="0" y1="237" x2="400" y2="237"/><line x1="0" y1="240" x2="400" y2="240"/><line x1="0" y1="243" x2="400" y2="243"/><line x1="0" y1="246" x2="400" y2="246"/><line x1="0" y1="249" x2="400" y2="249"/>
</g>
<!-- title -->
<text x="16" y="28" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="14" font-weight="700" fill="#ffffff" letter-spacing="2" style="text-shadow:0 0 4px #e85f4d">RUMOR WHACK</text>
<text x="16" y="42" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="8" fill="#e85f4d" letter-spacing="3" opacity="0.7">DEBUNK&#160;DESK</text>
<!-- genre tag -->
<text x="384" y="240" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="9" fill="#b8895c" letter-spacing="2">WHACK-A-MOLE</text>
<!-- border -->
<rect x="1" y="1" width="398" height="248" fill="none" stroke="#b8895c" stroke-width="2"/>
</svg>
