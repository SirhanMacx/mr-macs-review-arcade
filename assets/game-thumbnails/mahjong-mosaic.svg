<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
<!-- Mr. Mac's Arcade thumbnail · Mahjong Mosaic · 400×250 editorial dark -->
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#10141d"/>
    <stop offset="1" stop-color="#0a0d14"/>
  </linearGradient>
  <linearGradient id="tileTop" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#fff8e0"/>
    <stop offset="1" stop-color="#e8d5a0"/>
  </linearGradient>
  <linearGradient id="tileSide" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#a08560"/>
    <stop offset="1" stop-color="#5a4530"/>
  </linearGradient>
</defs>
<rect width="400" height="250" fill="url(#bg)"/>
<!-- We'll draw tile pyramid: base 7 wide x 4 tall stacked back further. Each tile face 28x36, depth 5 -->
<!-- Tile drawing is layer-by-layer, lowest first (back) -->
<!-- Tile helper: at (x,y) top-left of face -->
<!-- Layer 0 (bottom, widest) - 8 tiles -->
<g>
  <!-- Each tile: face rect; right side parallelogram; top side parallelogram -->
  <!-- We'll draw 8 tiles in a row, then 6 above, then 4, then 2 -->
</g>
<!-- bottom row 8 tiles, y = 195 -->
<g stroke="#0a0d14" stroke-width="0.8">
  <!-- tile 1 -->
  <polygon points="80,195 108,190 108,222 80,227" fill="url(#tileSide)" opacity="0.7"/>
  <rect x="80" y="195" width="28" height="32" fill="url(#tileTop)"/>
  <text x="94" y="218" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="14" fill="#a04432" font-weight="700">三</text>

  <polygon points="115,195 143,190 143,222 115,227" fill="url(#tileSide)" opacity="0.7"/>
  <rect x="115" y="195" width="28" height="32" fill="url(#tileTop)"/>
  <text x="129" y="218" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="14" fill="#0a3a5c" font-weight="700">東</text>

  <polygon points="150,195 178,190 178,222 150,227" fill="url(#tileSide)" opacity="0.7"/>
  <rect x="150" y="195" width="28" height="32" fill="url(#tileTop)"/>
  <text x="164" y="218" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="14" fill="#2a7a4a" font-weight="700">發</text>

  <polygon points="185,195 213,190 213,222 185,227" fill="url(#tileSide)" opacity="0.7"/>
  <rect x="185" y="195" width="28" height="32" fill="url(#tileTop)"/>
  <text x="199" y="218" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="14" fill="#a04432" font-weight="700">中</text>

  <polygon points="220,195 248,190 248,222 220,227" fill="url(#tileSide)" opacity="0.7"/>
  <rect x="220" y="195" width="28" height="32" fill="url(#tileTop)"/>
  <text x="234" y="218" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="14" fill="#5a3a8a" font-weight="700">五</text>

  <polygon points="255,195 283,190 283,222 255,227" fill="url(#tileSide)" opacity="0.7"/>
  <rect x="255" y="195" width="28" height="32" fill="url(#tileTop)"/>
  <text x="269" y="218" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="14" fill="#0a3a5c" font-weight="700">南</text>

