  <rect x="133" y="121" width="28" height="32" fill="url(#tileTop)"/>
  <text x="147" y="144" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="14" fill="#2a7a4a" font-weight="700">一</text>

  <polygon points="168,121 196,116 196,148 168,153" fill="url(#tileSide)" opacity="0.7"/>
  <rect x="168" y="121" width="28" height="32" fill="url(#tileTop)"/>
  <text x="182" y="144" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="14" fill="#a04432" font-weight="700">中</text>

  <polygon points="203,121 231,116 231,148 203,153" fill="url(#tileSide)" opacity="0.7"/>
  <rect x="203" y="121" width="28" height="32" fill="url(#tileTop)"/>
  <text x="217" y="144" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="14" fill="#5a3a8a" font-weight="700">八</text>

  <polygon points="238,121 266,116 266,148 238,153" fill="url(#tileSide)" opacity="0.7"/>
  <rect x="238" y="121" width="28" height="32" fill="url(#tileTop)"/>
  <text x="252" y="144" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="14" fill="#0a3a5c" font-weight="700">四</text>
</g>
<!-- top tile (king) -->
<g stroke="#0a0d14" stroke-width="0.8">
  <polygon points="186,84 214,79 214,111 186,116" fill="url(#tileSide)" opacity="0.7"/>
  <rect x="186" y="84" width="28" height="32" fill="url(#tileTop)"/>
  <text x="200" y="107" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="14" fill="#a04432" font-weight="700">龍</text>
</g>
<!-- highlight glow on top tile -->
<rect x="184" y="82" width="32" height="35" fill="none" stroke="#f5c451" stroke-width="1" opacity="0.6"/>
<!-- scanlines -->
<g opacity="0.06" stroke="white" stroke-width="0.5">
