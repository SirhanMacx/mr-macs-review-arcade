<!-- title -->
<text x="16" y="28" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="14" font-weight="700" fill="#ffffff" letter-spacing="2" style="text-shadow:0 0 4px #f5c451">KNIGHT'S QUEST</text>
<text x="16" y="42" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="8" fill="#f5c451" letter-spacing="3" opacity="0.7">DUNGEON&#160;CRAWL</text>
