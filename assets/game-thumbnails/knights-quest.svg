<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
<!-- Mr. Mac's Arcade thumbnail · KNIGHT'S QUEST · 400×250 editorial dark -->
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#10141d"/>
    <stop offset="1" stop-color="#0a0d14"/>
  </linearGradient>
</defs>
<rect width="400" height="250" fill="url(#bg)"/>
<!-- dungeon room walls -->
<rect x="60" y="60" width="280" height="160" fill="none" stroke="#b8895c" stroke-width="2" opacity="0.6"/>
<!-- stone tile pattern -->
<g stroke="#b8895c" stroke-width="0.3" opacity="0.18">
  <line x1="60" y1="92" x2="340" y2="92"/>
  <line x1="60" y1="124" x2="340" y2="124"/>
  <line x1="60" y1="156" x2="340" y2="156"/>
  <line x1="60" y1="188" x2="340" y2="188"/>
  <line x1="120" y1="60" x2="120" y2="220"/>
  <line x1="180" y1="60" x2="180" y2="220"/>
  <line x1="240" y1="60" x2="240" y2="220"/>
  <line x1="300" y1="60" x2="300" y2="220"/>
</g>
<!-- knight (player, top-left area) -->
<g transform="translate(120,140)">
  <!-- shield body -->
  <path d="M -10 -12 L 10 -12 L 12 4 Q 0 14 -12 4 Z" fill="#7af0ff" stroke="#ffffff" stroke-width="0.8"/>
  <!-- helmet -->
  <rect x="-7" y="-20" width="14" height="10" rx="2" fill="#bff8ff" stroke="#ffffff" stroke-width="0.5"/>
  <rect x="-5" y="-17" width="10" height="2" fill="#0a0d14"/>
  <!-- sword pointing right -->
  <rect x="10" y="-2" width="22" height="3" fill="#f5c451"/>
  <rect x="30" y="-3" width="3" height="5" fill="#f5c451"/>
  <rect x="8" y="-4" width="2" height="7" fill="#b8895c"/>
</g>
<!-- skeleton enemy (right side) -->
<g transform="translate(260,150)">
  <circle cx="0" cy="-12" r="6" fill="#bff8ff" stroke="#0a0d14" stroke-width="0.6"/>
  <circle cx="-2" cy="-13" r="1.2" fill="#0a0d14"/>
  <circle cx="2" cy="-13" r="1.2" fill="#0a0d14"/>
  <rect x="-1" y="-10" width="2" height="2" fill="#0a0d14"/>
  <rect x="-6" y="-5" width="12" height="14" fill="#bff8ff" stroke="#0a0d14" stroke-width="0.5"/>
  <line x1="-4" y1="-2" x2="4" y2="-2" stroke="#0a0d14" stroke-width="0.5"/>
  <line x1="-4" y1="2" x2="4" y2="2" stroke="#0a0d14" stroke-width="0.5"/>
  <line x1="-4" y1="6" x2="4" y2="6" stroke="#0a0d14" stroke-width="0.5"/>
  <!-- bone arms -->
  <rect x="-12" y="-2" width="6" height="2" fill="#bff8ff" stroke="#0a0d14" stroke-width="0.3"/>
  <rect x="6" y="-2" width="6" height="2" fill="#bff8ff" stroke="#0a0d14" stroke-width="0.3"/>
</g>
<!-- chest (bottom center-left) -->
<g transform="translate(160,200)">
  <rect x="-12" y="-8" width="24" height="14" fill="#b8895c" stroke="#0a0d14" stroke-width="0.6"/>
  <rect x="-12" y="-12" width="24" height="6" rx="2" fill="#f5c451" stroke="#0a0d14" stroke-width="0.6"/>
  <rect x="-2" y="-10" width="4" height="4" fill="#0a0d14"/>
  <rect x="-1" y="-9" width="2" height="2" fill="#f5c451"/>
</g>
<!-- glowing relic (top-right corner) -->
<g transform="translate(290,95)">
  <circle r="14" fill="#f5c451" opacity="0.18"/>
  <circle r="9" fill="#f5c451" opacity="0.32"/>
  <polygon points="0,-7 5,0 0,7 -5,0" fill="#f5c451" stroke="#ffffff" stroke-width="0.6"/>
  <circle r="2" fill="#bff8ff"/>
</g>
<!-- exit hint -->
<rect x="178" y="58" width="24" height="6" fill="#0a0d14"/>
<text x="190" y="58" text-anchor="middle" font-family="monospace" font-size="6" fill="#5fd699">EXIT</text>

