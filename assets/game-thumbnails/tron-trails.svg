<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
<!-- Mr. Mac's Arcade thumbnail · Tron Trails · 400×250 editorial dark -->
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#10141d"/>
    <stop offset="1" stop-color="#0a0d14"/>
  </linearGradient>
  <linearGradient id="cyanT" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#bff8ff"/><stop offset="1" stop-color="#7af0ff"/></linearGradient>
  <linearGradient id="magT" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffd0eb"/><stop offset="1" stop-color="#ff7cc8"/></linearGradient>
</defs>
<rect width="400" height="250" fill="url(#bg)"/>
