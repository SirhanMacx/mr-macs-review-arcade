  <line x1="340" y1="55" x2="340" y2="215"/>
  <line x1="360" y1="55" x2="360" y2="215"/>
</g>
<!-- cyan trail (path with bends) -->
<path d="M 60 200 L 60 140 L 140 140 L 140 100 L 220 100 L 220 70" fill="none" stroke="url(#cyanT)" stroke-width="3" stroke-linejoin="miter" filter="url(#none)"/>
<path d="M 60 200 L 60 140 L 140 140 L 140 100 L 220 100 L 220 70" fill="none" stroke="#bff8ff" stroke-width="1" stroke-linejoin="miter" opacity="0.7"/>
<!-- magenta trail -->
<path d="M 340 70 L 340 130 L 260 130 L 260 170 L 200 170" fill="none" stroke="url(#magT)" stroke-width="3" stroke-linejoin="miter"/>
<path d="M 340 70 L 340 130 L 260 130 L 260 170 L 200 170" fill="none" stroke="#ffd0eb" stroke-width="1" stroke-linejoin="miter" opacity="0.7"/>
<!-- light cycle (cyan) at trail head -->
<g transform="translate(220,70)">
  <rect x="-6" y="-3" width="12" height="6" rx="1" fill="#7af0ff" stroke="#0a0d14" stroke-width="0.8"/>
  <rect x="-7" y="3" width="14" height="3" rx="1" fill="#bff8ff"/>
  <circle cx="-4" cy="6" r="2" fill="#0a0d14"/>
  <circle cx="4" cy="6" r="2" fill="#0a0d14"/>
</g>
<!-- light cycle (magenta) at trail head -->
<g transform="translate(200,170)">
  <rect x="-6" y="-3" width="12" height="6" rx="1" fill="#ff7cc8" stroke="#0a0d14" stroke-width="0.8"/>
  <rect x="-7" y="3" width="14" height="3" rx="1" fill="#ffd0eb"/>
  <circle cx="-4" cy="6" r="2" fill="#0a0d14"/>
  <circle cx="4" cy="6" r="2" fill="#0a0d14"/>
</g>
<!-- glow nodes at corners -->
<g>
  <circle cx="60" cy="140" r="3" fill="#7af0ff" opacity="0.7"/>
  <circle cx="140" cy="140" r="3" fill="#7af0ff" opacity="0.7"/>
  <circle cx="140" cy="100" r="3" fill="#7af0ff" opacity="0.7"/>
  <circle cx="220" cy="100" r="3" fill="#7af0ff" opacity="0.7"/>
  <circle cx="340" cy="130" r="3" fill="#ff7cc8" opacity="0.7"/>
  <circle cx="260" cy="130" r="3" fill="#ff7cc8" opacity="0.7"/>
  <circle cx="260" cy="170" r="3" fill="#ff7cc8" opacity="0.7"/>
</g>
<!-- horizon glow -->
<rect x="40" y="55" width="320" height="2" fill="#7af0ff" opacity="0.4"/>
