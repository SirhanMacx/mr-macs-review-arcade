name: Validate Arcade

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install asset generator dependency
        run: python -m pip install --disable-pip-version-check pillow

      - name: Validate manifest, assets, source locks, and game contracts
        run: python3 scripts/validate_arcade.py

      - name: Verify arcade boot contract
        run: node scripts/verify-arcade.mjs
